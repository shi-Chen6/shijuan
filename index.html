<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潮南教师招聘 - 试卷导航中心</title>
    <style>
        :root {
            --primary: #4a6cf7;
            --primary-light: #eef1ff;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f5f6f8;
            --card-bg: #ffffff;
            --text: #1c1c1e;
            --text-secondary: #555;
            --border: #e5e5ea;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            padding-bottom: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .dashboard {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .exam-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .exam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
        }

        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .exam-title {
            font-size: 18px;
            font-weight: 600;
        }

        .exam-action {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .exam-action:hover {
            background: #3a5ce5;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .value-danger { color: var(--danger); }
        .value-success { color: var(--success); }

        .progress-container {
            margin-bottom: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .wrong-list-container {
            flex-grow: 1;
            margin-top: auto;
            background: var(--primary-light);
            border-radius: 8px;
            padding: 12px;
        }

        .wrong-list-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .wrong-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .wrong-tag {
            font-size: 12px;
            background: white;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .no-data {
            font-size: 13px;
            color: #888;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>📖 潮南区试卷导航中心</h1>
        <p>实时同步您的刷题进度与错题记录</p>
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px;">
            <button class="exam-action" onclick="exportData()" style="border: none; cursor: pointer;">导出记录</button>
            <button class="exam-action" onclick="document.getElementById('importFile').click()" style="border: none; cursor: pointer; background: #10b981;">导入记录</button>
            <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(event)">
        </div>
    </header>

    <div class="dashboard" id="dashboard">
        <!-- 卡片动态渲染 -->
    </div>

    <script>
        const exams = [
            { id: 1, title: '潮南教师招聘模拟题（一）', link: '模拟1.html', key: 'exam_stats_1' },
            { id: 2, title: '潮南教师招聘模拟题（二）', link: '模拟2.html', key: 'exam_stats_2' },
            { id: 3, title: '潮南教师招聘模拟题（三）', link: '模拟3.html', key: 'exam_stats_3' },
            { id: 4, title: '潮南教师招聘模拟题（四）', link: '模拟4.html', key: 'exam_stats_4' },
            { id: 9, title: '敬一畏模拟题（一）', link: '敬一畏模拟1.html', key: 'exam_stats_jy1' },
            { id: 10, title: '敬一畏模拟题（二）', link: '敬一畏模拟2.html', key: 'exam_stats_jy2' },
            { id: 11, title: '敬一畏模拟题（三）', link: '敬一畏模拟3.html', key: 'exam_stats_jy3' },
            { id: 12, title: '敬一畏模拟题（四）', link: '敬一畏模拟4.html', key: 'exam_stats_jy4' },
            { id: 5, title: '潮南教师招聘真题（一）', link: '真题1.html', key: 'exam_stats_5' },
            { id: 6, title: '潮南教师招聘真题（二）', link: '真题2.html', key: 'exam_stats_6' },
            { id: 7, title: '潮南教师招聘真题（三）', link: '真题3.html', key: 'exam_stats_7' },
            { id: 8, title: '潮南教师招聘真题（四）', link: '真题4.html', key: 'exam_stats_8' }
        ];

        function exportData() {
            const dataToExport = {};
            exams.forEach(exam => {
                const statStr = localStorage.getItem(exam.key);
                if (statStr) {
                    dataToExport[exam.key] = statStr;
                }
            });
            
            const dataStr = JSON.stringify(dataToExport);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', '答题记录备份.json');
            document.body.appendChild(linkElement);
            linkElement.click();
            document.body.removeChild(linkElement);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let importedCount = 0;
                    
                    for (const key in importedData) {
                        if (exams.some(exam => exam.key === key)) {
                            localStorage.setItem(key, importedData[key]);
                            importedCount++;
                        }
                    }
                    
                    if (importedCount > 0) {
                        alert('成功导入 ' + importedCount + ' 条记录！');
                        renderDashboard();
                    } else {
                        alert('导入的文件中没有找到有效的答题记录。');
                    }
                } catch (error) {
                    alert('导入失败：文件格式不正确，请确保上传了正确的JSON文件。');
                    console.error(error);
                }
                
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            exams.forEach(exam => {
                const statStr = localStorage.getItem(exam.key);
                let stats = null;
                
                if (statStr) {
                    try {
                        stats = JSON.parse(statStr);
                    } catch(e) {
                        console.error('JSON parse error for', exam.key);
                    }
                }

                const card = document.createElement('div');
                card.className = 'exam-card';

                if (!stats || !stats.total) { // 未作答或暂无数据
                    card.innerHTML = `
                        <div class="exam-header">
                            <div class="exam-title">${exam.title}</div>
                            <a href="${exam.link}" class="exam-action">开始答题</a>
                        </div>
                        <div class="no-data">暂无答题记录，请开始刷题吧！</div>
                    `;
                } else {
                    const progressPercent = Math.round((stats.answered / stats.total) * 100) || 0;
                    const wrongCount = stats.wrong || 0;
                    
                    let wrongTagsHtml = '';
                    if (stats.wrongQuestions && stats.wrongQuestions.length > 0) {
                        wrongTagsHtml = stats.wrongQuestions.map(wq => `<span class="wrong-tag">第${wq.num}题</span>`).join('');
                    } else if (wrongCount === 0 && stats.answered > 0) {
                        wrongTagsHtml = `<span style="font-size:12px;color:var(--success);">🎉 全对，太棒了！</span>`;
                    }
                    
                    card.innerHTML = `
                        <div class="exam-header">
                            <div class="exam-title">${exam.title}</div>
                            <a href="${exam.link}" class="exam-action">${stats.answered > 0 ? '继续答题' : '开始答题'}</a>
                        </div>
                        
                        <div class="progress-container">
                            <div class="progress-header">
                                <span>答题进度</span>
                                <span>${stats.answered} / ${stats.total} (${progressPercent}%)</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                            </div>
                        </div>

                        <div class="stat-grid">
                            <div class="stat-item">
                                <div class="stat-label">已答题目</div>
                                <div class="stat-value value-success">${stats.answered}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">错题数量</div>
                                <div class="stat-value value-danger">${wrongCount}</div>
                            </div>
                        </div>

                        <div class="wrong-list-container">
                            <div class="wrong-list-title">错题记录</div>
                            <div class="wrong-tags">
                                ${(stats.answered === 0) ? '<span style="font-size:12px;color:#888;">暂无数据</span>' : wrongTagsHtml}
                            </div>
                        </div>
                    `;
                }

                dashboard.appendChild(card);
            });
        }

        // 初始化和实时更新
        document.addEventListener('DOMContentLoaded', renderDashboard);
        window.addEventListener('pageshow', renderDashboard); // 当用户从模拟卷后退回来时触发渲染更新
    </script>
</body>
</html>
