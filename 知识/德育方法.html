<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>德育六大方法刷题</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6">
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --primary-color: #4a90e2;
            --primary-light: #e6f7ff;
            --success-color: #52c41a;
            --success-light: #f6ffed;
            --error-color: #f5222d;
            --error-light: #fff2f0;
            --warning-color: #faad14;
            --warning-light: #fffbe6;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-light: #999999;
            --bg-main: #f5f7fa;
            --bg-card: #ffffff;
            --border-color: #e8e8e8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.12);
            --font-size-base: 16px;
            --font-size-small: 14px;
            --font-size-large: 18px;
            --radius: 12px;
            --radius-sm: 8px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-size: var(--font-size-base);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            transition: font-size 0.3s ease;
        }
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--primary-color), #6ba8ff);
            color: white;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            z-index: 200;
            box-shadow: var(--shadow);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .left-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn,
        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:active,
        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }
        .question-info {
            text-align: center;
            flex: 1;
        }
        .question-number {
            font-size: 18px;
            font-weight: 600;
        }
        .progress-text {
            font-size: 12px;
            opacity: 0.9;
        }
        .right-section {
            display: flex;
            gap: 8px;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 140px;
        }
        .knowledge-page {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .knowledge-page.hidden {
            display: none;
        }
        .knowledge-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .knowledge-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.4;
        }
        .knowledge-content {
            font-size: var(--font-size-base);
            line-height: 1.8;
            color: var(--text-primary);
        }
        .knowledge-content h3 {
            font-size: 16px;
            font-weight: 700;
            margin: 18px 0 8px;
            color: var(--primary-color);
            padding-left: 10px;
            border-left: 4px solid var(--primary-color);
        }
        .knowledge-content p {
            margin-bottom: 10px;
        }
        .knowledge-content ul {
            margin: 8px 0 12px 18px;
        }
        .knowledge-content li {
            margin-bottom: 6px;
        }
        .knowledge-content .highlight {
            background: var(--primary-light);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }
        .knowledge-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0 4px;
            font-size: 13px;
        }
        .knowledge-table th,
        .knowledge-table td {
            border: 1px solid var(--border-color);
            padding: 8px 6px;
            text-align: center;
        }
        .knowledge-table th {
            background: #f5f7fb;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .start-quiz-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color), #6ba8ff);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .start-quiz-btn:active {
            transform: scale(0.98);
        }
        .question-card,
        .analysis-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .question-type {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary-light);
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .question-stem {
            font-size: var(--font-size-large);
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .formula {
            background: #fafafa;
            padding: 16px;
            border-radius: var(--radius-sm);
            margin: 16px 0;
            font-family: 'Courier New', monospace;
            text-align: center;
            border-left: 4px solid var(--primary-color);
            overflow-x: auto;
        }
        .question-image {
            width: 100%;
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin: 16px 0;
            display: block;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 56px;
            position: relative;
        }
        .option-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-sm);
            pointer-events: none;
        }
        .option-item:hover {
            border-color: var(--primary-color);
        }
        .option-item.selected {
            border-color: var(--primary-color);
            background: var(--primary-light);
            transform: scale(1.01);
        }
        .option-item.correct {
            border-color: var(--success-color);
            background: var(--success-light);
        }
        .option-item.wrong {
            border-color: var(--error-color);
            background: var(--error-light);
        }
        .option-label {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        .selected .option-label {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .correct .option-label {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }
        .wrong .option-label {
            background: var(--error-color);
            color: white;
            border-color: var(--error-color);
        }
        .option-text {
            flex: 1;
            padding-top: 2px;
        }
        .analysis-card {
            padding: 0;
            margin-top: 16px;
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 800px;
            }
        }
        .analysis-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #fafafa;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        .analysis-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .result-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .result-badge.correct {
            background: var(--success-light);
            color: var(--success-color);
        }
        .result-badge.wrong {
            background: var(--error-light);
            color: var(--error-color);
        }
        .toggle-icon {
            transition: transform 0.3s ease;
        }
        .toggle-icon.expanded {
            transform: rotate(180deg);
        }
        .analysis-content {
            padding: 20px;
            font-size: var(--font-size-small);
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .analysis-content p {
            margin-bottom: 10px;
        }
        .analysis-content strong {
            color: var(--text-primary);
            font-size: 15px;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.08);
            z-index: 150;
        }
        .footer.hidden {
            transform: translateY(100%);
        }
        .footer-content {
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .nav-btn:active {
            transform: scale(0.98);
        }
        .prev-btn {
            background: #f5f5f5;
            color: var(--text-secondary);
        }
        .prev-btn:not(:disabled):hover {
            background: #e8e8e8;
        }
        .next-btn {
            background: linear-gradient(135deg, var(--primary-color), #6ba8ff);
            color: white;
        }
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .sheet-overlay,
        .history-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.show,
        .history-overlay.show {
            display: block;
            opacity: 1;
        }
        .sheet-panel,
        .history-panel {
            position: fixed;
            background: var(--bg-card);
            z-index: 400;
            transition: transform 0.3s ease;
            overflow-y: auto;
        }
        .sheet-panel {
            bottom: 0;
            left: 50%;
            right: auto;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            transform: translate(-50%, 100%);
            max-height: 70vh;
            width: min(430px, 100%);
        }
        .sheet-panel.show {
            transform: translate(-50%, 0);
        }
        .history-panel {
            top: 0;
            right: 0;
            bottom: 0;
            width: 85%;
            max-width: 360px;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            transform: translateX(100%);
        }
        .history-panel.show {
            transform: translateX(0);
        }
        .sheet-header,
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .sheet-title,
        .history-title {
            font-size: 18px;
            font-weight: 600;
        }
        .close-sheet {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
        }
        .sheet-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-btn,
        .clear-history {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn {
            background: #f5f5f5;
            color: var(--text-secondary);
        }
        .filter-btn.active {
            background: var(--primary-color);
            color: white;
        }
        .clear-history {
            background: #fff2f0;
            color: var(--error-color);
        }
        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        .sheet-item {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--border-color);
            background: white;
        }
        .sheet-item.unanswered {
            border-color: var(--border-color);
            color: var(--text-secondary);
        }
        .sheet-item.correct {
            border-color: var(--success-color);
            background: var(--success-light);
            color: var(--success-color);
        }
        .sheet-item.wrong {
            border-color: var(--error-color);
            background: var(--error-light);
            color: var(--error-color);
        }
        .sheet-item.current {
            border-width: 3px;
            border-color: var(--primary-color);
            transform: scale(1.05);
        }
        .sheet-number {
            font-size: 16px;
        }
        .sheet-status {
            font-size: 10px;
            margin-top: 2px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-item {
            background: #fafafa;
            border-radius: var(--radius-sm);
            padding: 16px;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        .history-item:active {
            transform: scale(0.98);
        }
        .history-date {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .history-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .history-stat {
            text-align: center;
        }
        .history-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
        }
        .history-label {
            font-size: 11px;
            color: var(--text-light);
        }
        .history-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .history-action-btn {
            flex: 1;
            padding: 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .review-btn {
            background: var(--primary-color);
            color: white;
        }
        .delete-btn {
            background: #f5f5f5;
            color: var(--text-secondary);
        }
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }
        .completion-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--success-color), #73d13d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: white;
        }
        .completion-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .action-btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .restart-btn {
            background: linear-gradient(135deg, var(--primary-color), #6ba8ff);
            color: white;
        }
        .history-view-btn {
            background: #f5f5f5;
            color: var(--text-secondary);
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        @media (min-width: 768px) {
            .app-container {
                border-radius: 20px;
                margin: 20px auto;
                min-height: calc(100vh - 40px);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            }
            .footer {
                position: static;
                border-radius: 0 0 20px 20px;
            }
            .sheet-panel {
                border-radius: 20px;
                bottom: 20px;
                max-height: 60vh;
            }
        }
        @media (max-width: 360px) {
            .sheet-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <div class="left-section">
                    <div class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i></div>
                    <div class="question-info" id="questionInfo">
                        <div class="question-number">第 <span id="currentNum">1</span> 题</div>
                        <div class="progress-text"><span id="answeredCount">0</span>/<span id="totalCount">0</span> 已答</div>
                    </div>
                    <div class="question-info" id="pageTitle" style="display: none;">
                        <div class="question-number">德育六大方法</div>
                        <div class="progress-text">教招必背 · 高频考点</div>
                    </div>
                </div>
                <div class="right-section">
                    <div class="icon-btn" onclick="toggleSheet()"><i class="fas fa-th-large"></i></div>
                    <div class="icon-btn" onclick="toggleHistory()"><i class="fas fa-history"></i></div>
                    <div class="icon-btn" onclick="changeFontSize(-1)"><i class="fas fa-font"></i>-</div>
                    <div class="icon-btn" onclick="changeFontSize(1)"><i class="fas fa-font"></i>+</div>
                </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 5%"></div></div>
        </header>

        <main class="content-area" id="contentArea">
            <div class="knowledge-page" id="knowledgePage">
                <div class="knowledge-card">
                    <div class="knowledge-title" id="knowledgeTitle"></div>
                    <div class="knowledge-content" id="knowledgeContent"></div>
                </div>
            </div>
            <div id="quizContent" style="display: none;"></div>
        </main>

        <footer class="footer"><div class="footer-content" id="footerContent"></div></footer>

        <div class="sheet-overlay" id="sheetOverlay" onclick="toggleSheet()"></div>
        <div class="sheet-panel" id="sheetPanel">
            <div class="sheet-header">
                <div class="sheet-title">答题卡</div>
                <div class="close-sheet" onclick="toggleSheet()"><i class="fas fa-times"></i></div>
            </div>
            <div class="sheet-filters">
                <button class="filter-btn active" onclick="filterQuestions('all')">全部</button>
                <button class="filter-btn" onclick="filterQuestions('unanswered')">未答</button>
                <button class="filter-btn" onclick="filterQuestions('correct')">正确</button>
                <button class="filter-btn" onclick="filterQuestions('wrong')">错误</button>
            </div>
            <div class="sheet-grid" id="sheetGrid"></div>
        </div>

        <div class="history-overlay" id="historyOverlay" onclick="toggleHistory()"></div>

            if (savedSettings) { const settings = JSON.parse(savedSettings);
                fontSize = settings.fontSize || 16;
                document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
                document.documentElement.style.setProperty('--font-size-small', (fontSize - 2) + 'px');
                document.documentElement.style.setProperty('--font-size-large', (fontSize + 2) + 'px'); }
        }

        function restartQuiz() { if (confirm('确定要重新开始吗？当前进度将被清除。')) { currentIndex = 0;
                answers = new Array(questions.length).fill(null);
                localStorage.removeItem(STORAGE_KEY_ANSWERS);
                renderQuestion();
                updateNavButtons(); } }

        function showHome() { if (confirm('返回主页将丢失当前进度，确定吗？')) { window.location.href = 'index.html'; } }

        function showToast(message) { const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500); }
    </script>
</body>
</html>
