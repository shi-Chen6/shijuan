<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>汕头市潮南教师招聘笔试模拟题（四）</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-secondary: #5a6c7d;
            --text-light: #7f8c9b;
            --primary: #4a6cf7;
            --primary-light: #eef1ff;
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --border: #e8ecf1;
            --border-active: #4a6cf7;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --font-base: 16px;
            --font-lg: 18px;
            --font-sm: 14px;
            --font-xs: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        [data-font="small"] {
            --font-base: 14px;
            --font-lg: 16px;
            --font-sm: 12px;
            --font-xs: 11px;
        }
        [data-font="large"] {
            --font-base: 18px;
            --font-lg: 20px;
            --font-sm: 15px;
            --font-xs: 13px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--font-base);
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            box-shadow: var(--shadow-md);
        }

        @media (min-width: 481px) {
            body {
                padding: 20px 0;
                align-items: flex-start;
            }
            .app-container {
                border-radius: 20px;
                min-height: auto;
                height: auto;
                overflow: hidden;
                margin: 10px 0;
            }
        }

        /* 顶部导航栏 */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.92);
        }
        .btn-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            min-width: 40px;
            min-height: 40px;
        }
        .btn-back:active {
            background: #e2e6ea;
            transform: scale(0.94);
        }
        .top-info {
            flex: 1;
            min-width: 0;
        }
        .top-info .question-number {
            font-weight: 700;
            font-size: var(--font-lg);
            color: var(--text);
            line-height: 1.2;
        }
        .top-info .section-label {
            font-size: var(--font-xs);
            color: var(--text-light);
            line-height: 1.2;
        }
        .progress-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .progress-bar-wrap {
            width: 60px;
            height: 6px;
            background: #e8ecf1;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.35s ease;
        }
        .progress-text {
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-font {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            min-width: 36px;
            min-height: 36px;
            font-weight: 700;
        }
        .btn-font:active {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* 主内容滚动区 */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        /* 题目卡片 */
        .question-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
        }
        .question-type-badge {
            display: inline-block;
            font-size: var(--font-xs);
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .badge-single {
            background: #eef1ff;
            color: #4a6cf7;
        }
        .badge-multi {
            background: #fef3c7;
            color: #b45309;
        }
        .badge-judge {
            background: #ecfdf5;
            color: #059669;
        }
        .question-stem {
            font-size: var(--font-lg);
            font-weight: 500;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            -webkit-user-select: text;
            user-select: text;
        }

        /* 选项列表 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 13px;
            margin-top: 8px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 15px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            background: #fafbfc;
            min-height: 48px;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .option-item:active {
            transform: scale(0.985);
            background: #f0f2f5;
        }
        .option-item.selected {
            border-color: var(--border-active);
            background: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }
        .option-item.correct {
            border-color: var(--success) !important;
            background: var(--success-light) !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1) !important;
        }
        .option-item.wrong {
            border-color: var(--danger) !important;
            background: var(--danger-light) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }
        .option-item.correct-user {
            border-color: var(--success) !important;
            background: var(--success-light) !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12) !important;
        }
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--font-sm);
            flex-shrink: 0;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .option-item.selected .option-letter {
            background: var(--primary);
            color: #fff;
        }
        .option-item.correct .option-letter,
        .option-item.correct-user .option-letter {
            background: var(--success);
            color: #fff;
        }
        .option-item.wrong .option-letter {
            background: var(--danger);
            color: #fff;
        }
        .option-text {
            flex: 1;
            font-size: var(--font-base);
            line-height: 1.5;
            color: var(--text);
            padding-top: 3px;
            -webkit-user-select: text;
            user-select: text;
        }
        .option-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #d0d5dd;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            margin-top: 3px;
        }
        .option-item.selected .option-check {
            border-color: var(--primary);
            background: var(--primary);
        }
        .option-item.selected .option-check::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }
        .option-item.correct .option-check,
        .option-item.correct-user .option-check {
            border-color: var(--success);
            background: var(--success);
        }
        .option-item.correct .option-check::after,
        .option-item.correct-user .option-check::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }
        .option-item.wrong .option-check {
            border-color: var(--danger);
            background: var(--danger);
        }
        .option-item.wrong .option-check::after {
            content: '✕';
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.85;
        }

        /* 多选确认按钮 */
        .confirm-btn-wrap {
            margin-top: 6px;
            display: flex;
            justify-content: flex-end;
        }
        .btn-confirm {
            padding: 11px 28px;
            border-radius: 25px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: var(--font-base);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            min-height: 44px;
            letter-spacing: 0.5px;
        }
        .btn-confirm:active {
            transform: scale(0.95);
            opacity: 0.85;
        }
        .btn-confirm:disabled {
            background: #c0c7d4;
            pointer-events: none;
        }

        /* 答案与解析区域 */
        .answer-reveal {
            margin-top: 14px;
            padding: 16px;
            background: #f9fafb;
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease;
        }
        .answer-reveal.correct-answer {
            border-left-color: var(--success);
            background: #f9fdfb;
        }
        .answer-reveal.wrong-answer {
            border-left-color: var(--danger);
            background: #fefafa;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .answer-status {
            font-weight: 700;
            font-size: var(--font-base);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .answer-status .icon-status {
            font-size: 18px;
        }
        .correct-text {
            color: var(--success);
        }
        .wrong-text {
            color: var(--danger);
        }
        .answer-detail {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 4px;
        }
        .analysis-toggle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: var(--font-sm);
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            padding: 6px 0;
            transition: var(--transition);
            min-height: 36px;
            border: none;
            background: none;
            -webkit-tap-highlight-color: transparent;
        }
        .analysis-toggle:active {
            opacity: 0.7;
        }
        .analysis-toggle .arrow {
            transition: transform 0.25s ease;
            display: inline-block;
            font-size: 12px;
        }
        .analysis-toggle.expanded .arrow {
            transform: rotate(180deg);
        }
        .analysis-content {
            margin-top: 8px;
            padding: 14px;
            background: #fff;
            border-radius: 8px;
            font-size: var(--font-sm);
            line-height: 1.7;
            color: var(--text-secondary);
            display: none;
            border: 1px solid #eef0f4;
            -webkit-user-select: text;
            user-select: text;
        }
        .analysis-content.show {
            display: block;
            animation: slideIn 0.25s ease;
        }
        .analysis-content .highlight {
            color: var(--primary);
            font-weight: 600;
        }

        /* 底部导航 */
        .bottom-nav {
            position: sticky;
            bottom: 0;
            background: var(--card-bg);
            padding: 12px 16px;
            padding-bottom: calc(12px + var(--safe-bottom));
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn-nav {
            flex: 1;
            padding: 13px 16px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: var(--font-base);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            min-height: 46px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .btn-nav:active {
            background: #f0f2f5;
            transform: scale(0.96);
        }
        .btn-nav:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-nav.primary-nav {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            flex: 1.3;
        }
        .btn-nav.primary-nav:active {
            background: #3b5de7;
            border-color: #3b5de7;
        }
        .btn-overview {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 46px;
            min-height: 46px;
        }
        .btn-overview:active {
            background: #f0f2f5;
            transform: scale(0.93);
        }

        /* 概览弹窗 */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .overlay-panel {
            background: var(--card-bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(20px + var(--safe-bottom));
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 1;
            padding-bottom: 8px;
        }
        .overlay-title {
            font-weight: 700;
            font-size: var(--font-lg);
        }
        .btn-close-overlay {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f2f5;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .btn-close-overlay:active {
            background: #e2e6ea;
        }
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }
        .overview-dot {
            aspect-ratio: 1;
            border-radius: 8px;
            font-size: var(--font-xs);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid var(--border);
            background: #fafbfc;
            transition: var(--transition);
            min-width: 32px;
            min-height: 32px;
            color: var(--text-secondary);
        }
        .overview-dot:active {
            transform: scale(0.9);
        }
        .overview-dot.done-correct {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .overview-dot.done-wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .overview-dot.current {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
            color: var(--primary);
            font-weight: 700;
        }
        .section-divider {
            grid-column: 1 / -1;
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 600;
            padding: 6px 0 2px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: var(--font-sm);
            font-weight: 500;
            pointer-events: none;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        /* 滚动条美化 */
        .main-scroll::-webkit-scrollbar {
            width: 3px;
        }
        .main-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: #d0d5dd;
            border-radius: 3px;
        }
    </style>
</head>
<body data-font="medium">
    <div class="app-container" id="appContainer">
        <!-- 顶部栏 -->
        <div class="top-bar">
            <button class="btn-back" id="btnBack" title="题目概览" aria-label="题目概览">☰</button>
            <div class="top-info">
                <div class="question-number" id="questionNumber">第1题</div>
                <div class="section-label" id="sectionLabel">单项选择题</div>
            </div>
            <div class="progress-mini">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="progress-text" id="progressText">1/100</span>
            </div>
            <button class="btn-font" id="btnFontSize" title="调整字体" aria-label="调整字体大小">A</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-scroll" id="mainScroll">
            <div class="question-card" id="questionCard">
                <span class="question-type-badge badge-single" id="typeBadge">单项选择题</span>
                <div class="question-stem" id="questionStem"></div>
                <div class="options-list" id="optionsList"></div>
                <div class="confirm-btn-wrap" id="confirmWrap" style="display:none;">
                    <button class="btn-confirm" id="btnConfirm">确认答案</button>
                </div>
                <div class="answer-reveal" id="answerReveal" style="display:none;"></div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <button class="btn-nav" id="btnPrev">◀ 上一题</button>
            <button class="btn-overview" id="btnOverview" title="题目概览" aria-label="题目概览">☰</button>
            <button class="btn-nav primary-nav" id="btnNext">下一题 ▶</button>
        </div>
    </div>

    <!-- 概览弹窗 -->
    <div class="overlay" id="overlay" style="display:none;">
        <div class="overlay-panel" id="overlayPanel">
            <div class="overlay-header">
                <span class="overlay-title">📋 答题进度</span>
                <button class="btn-close-overlay" id="btnCloseOverlay">✕</button>
            </div>
            <div class="overview-grid" id="overviewGrid"></div>
        </div>
    </div>

    <script>
        (function() {
            // ============ 题目数据 ============
            const allQuestions = [
                // === 第一部分：单项选择题 (1-60) ===
                {
                    id: 1,
                    type: 'single',
                    section: '单项选择题',
                    stem: '认为教育的最高目的是培养人内心"自由、完善、仁慈感、正义和公平"的五种道德观念的教育家是（）。',
                    options: [

            // ============ 应用状态 ============

            const $ = (sel) => document.querySelector(sel);

            const optionsList = $('#optionsList');

            const btnConfirm = $('#btnConfirm');

            const btnNext = $('#btnNext');

            // ============ 本地存储 ============
            const STORAGE_KEY = 'swatow_teacher_quiz_progress_v2';

            function saveProgress() {
                const data = {
                    userAnswers,
                    answerStatus,
                    currentIndex,
                    fontLevel,
                    timestamp: Date.now()
                };

                let answeredCount = 0;
                let wrongCount = 0;
                let wrongQuestions = [];
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    const qId = q.id;
                    if (userAnswers[qId]) {
                        answeredCount++;
                        if (answerStatus[qId] === 'wrong') {
                            wrongCount++;
                            wrongQuestions.push({ 
                                id: qId, 
                                num: i + 1,
                                type: q.type,
                                question: q.stem,
                                options: q.options,
                                correctAnswer: q.answer,
                                explanation: q.analysis
                            });
                        }
                    }
                }
                const statsObj = {
                    total: TOTAL,
                    answered: answeredCount,
                    wrong: wrongCount,
                    wrongQuestions: wrongQuestions
                };

                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    localStorage.setItem('exam_stats_4', JSON.stringify(statsObj));
                } catch (e) {
                    // localStorage 不可用
                }
            }

            function loadProgress() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (data && typeof data.currentIndex === 'number') {
                            userAnswers = data.userAnswers || {};
                            answerStatus = data.answerStatus || {};
                            currentIndex = Math.min(data.currentIndex, TOTAL - 1);
                            fontLevel = data.fontLevel || 'medium';
                        }
                    }
                } catch (e) {
                    // 忽略解析错误
                }
                // 初始化 multiSelectTemp
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    if (q.type === 'multi' && userAnswers[q.id]) {
                        multiSelectTemp[q.id] = new Set(userAnswers[q.id].split(''));
                    }
                }
            }

            // ============ 辅助函数 ============
            function getQuestionTypeLabel(type) {
                switch (type) {
                    case 'single':
                        return '单项选择题';
                    case 'multi':
                        return '多项选择题';
                    case 'judge':
                        return '判断题';
                    default:
                        return '';
                }
            }

            function getBadgeClass(type) {
                switch (type) {
                    case 'single':
                        return 'badge-single';
                    case 'multi':
                        return 'badge-multi';
                    case 'judge':
                        return 'badge-judge';
                    default:
                        return 'badge-single';
                }
            }

            function showToast(msg) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            // ============ 渲染题目 ============
            function renderQuestion() {
                const q = allQuestions[currentIndex];
                if (!q) return;

                // 更新顶部信息
                questionNumber.textContent = `第${q.id}题`;
                sectionLabel.textContent = q.section;
                const progressPercent = Math.round((currentIndex / TOTAL) * 100);
                progressFill.style.width = progressPercent + '%';
                progressText.textContent = `${currentIndex + 1}/${TOTAL}`;

                // 类型徽章
                typeBadge.textContent = getQuestionTypeLabel(q.type);
                typeBadge.className = 'question-type-badge ' + getBadgeClass(q.type);

                // 题干
                questionStem.textContent = q.stem;

                // 选项列表
                optionsList.innerHTML = '';
                confirmWrap.style.display = 'none';
                answerReveal.style.display = 'none';
                answerReveal.className = 'answer-reveal';

                const isAnswered = answerStatus.hasOwnProperty(q.id) && answerStatus[q.id] !== null;
                const userAns = userAnswers[q.id] || '';
                const correctAns = q.answer;

                // 多选题临时选择恢复
                if (q.type === 'multi' && !isAnswered && multiSelectTemp[q.id]) {
                    // 保持临时选择
                } else if (q.type === 'multi' && !multiSelectTemp[q.id]) {
                    multiSelectTemp[q.id] = new Set();
                }

                q.options.forEach((opt, idx) => {
                    const item = document.createElement('div');
                    item.className = 'option-item';
                    item.setAttribute('data-label', opt.label);
                    item.setAttribute('role', q.type === 'multi' ? 'checkbox' : 'radio');
                    item.setAttribute('aria-checked', 'false');

                    // 判断状态
                    if (isAnswered) {
                        item.classList.add('disabled');
                        const userLabels = userAns.split('');
                        const correctLabels = correctAns.split('');

                        if (correctLabels.includes(opt.label) && userLabels.includes(opt.label)) {
                            item.classList.add('correct-user');
                        } else if (correctLabels.includes(opt.label) && !userLabels.includes(opt.label)) {
                            item.classList.add('correct');
                        } else if (!correctLabels.includes(opt.label) && userLabels.includes(opt.label)) {
                            item.classList.add('wrong');
                        }
                    } else {
                        // 未答题：多选题显示临时选择状态
                        if (q.type === 'multi' && multiSelectTemp[q.id] && multiSelectTemp[q.id].has(
                                opt.label)) {
                            item.classList.add('selected');
                        }
                        if (q.type === 'single' || q.type === 'judge') {
                            // 单选/判断无临时状态（点击即提交）
                        }
                    }

                    item.innerHTML = `
                <span class="option-letter">${opt.label}</span>
                <span class="option-text">${opt.text}</span>
                <span class="option-check"></span>
              `;

                    item.addEventListener('click', () => handleOptionClick(q, opt.label, item, isAnswered));
                    optionsList.appendChild(item);
                });

                // 多选题确认按钮
                if (q.type === 'multi' && !isAnswered) {
                    confirmWrap.style.display = 'flex';
                    btnConfirm.disabled = (multiSelectTemp[q.id] && multiSelectTemp[q.id].size === 0) || !multiSelectTemp[
                        q.id];
                } else {
                    confirmWrap.style.display = 'none';
                }

                // 已答题显示答案和解析
                if (isAnswered) {
                    showAnswerReveal(q, userAns);
                }

                // 更新导航按钮
                btnPrev.disabled = currentIndex === 0;
                btnNext.disabled = currentIndex === TOTAL - 1;
                if (currentIndex === TOTAL - 1 && isAnswered) {
                    btnNext.textContent = '✓ 已完成';
                } else if (currentIndex === TOTAL - 1) {
                    btnNext.textContent = '最后一题 ▶';
                } else {
                    btnNext.textContent = '下一题 ▶';
                }

                // 滚动到顶部
                mainScroll.scrollTop = 0;

                // 保存进度
                saveProgress();
            }

            function handleOptionClick(q, label, itemElement, isAnswered) {
                if (isAnswered) return; // 已答题不可更改

                if (q.type === 'single' || q.type === 'judge') {
                    // 单选题和判断题：点击即提交
                    userAnswers[q.id] = label;
                    const isCorrect = (label === q.answer);
                    answerStatus[q.id] = isCorrect ? 'correct' : 'wrong';
                    // 视觉反馈
                    itemElement.classList.add(isCorrect ? 'correct-user' : 'wrong');
                    // 高亮正确答案
                    setTimeout(() => {
                        renderQuestion();
                    }, 250);
                    saveProgress();
                } else if (q.type === 'multi') {
                    // 多选题：切换选择
                    if (!multiSelectTemp[q.id]) multiSelectTemp[q.id] = new Set();
                    const tempSet = multiSelectTemp[q.id];
                    if (tempSet.has(label)) {
                        tempSet.delete(label);
                        itemElement.classList.remove('selected');
                    } else {
                        tempSet.add(label);
                        itemElement.classList.add('selected');
                    }
                    btnConfirm.disabled = tempSet.size === 0;
                    // 更新aria状态
                    itemElement.setAttribute('aria-checked', tempSet.has(label) ? 'true' : 'false');
                }
            }

            function handleMultiConfirm() {
                const q = allQuestions[currentIndex];
                if (q.type !== 'multi') return;
                const tempSet = multiSelectTemp[q.id];
                if (!tempSet || tempSet.size === 0) return;
                const userAnsStr = Array.from(tempSet).sort().join('');
                userAnswers[q.id] = userAnsStr;
                const isCorrect = (userAnsStr === q.answer);
                answerStatus[q.id] = isCorrect ? 'correct' : 'wrong';
                renderQuestion();
                saveProgress();
            }

            function showAnswerReveal(q, userAns) {
                answerReveal.style.display = 'block';
                const isCorrect = answerStatus[q.id] === 'correct';
                answerReveal.className = 'answer-reveal ' + (isCorrect ? 'correct-answer' : 'wrong-answer');

                let statusHTML = '';
                if (isCorrect) {
                    statusHTML =
                        '<span class="answer-status correct-text"><span class="icon-status">✅</span> 回答正确！</span>';
                } else {
                    statusHTML =
                        '<span class="answer-status wrong-text"><span class="icon-status">❌</span> 回答错误</span>';
                }

                let correctAnswerDisplay = '';
                if (q.type === 'judge') {
                    correctAnswerDisplay = q.answer === 'A' ? '正确' : '错误';
                } else {
                    correctAnswerDisplay = q.answer.split('').join('、');
                }

                answerReveal.innerHTML = `
              ${statusHTML}
              <div class="answer-detail">📝 正确答案：<strong>${correctAnswerDisplay}</strong></div>
              ${q.type==='multi' && !isCorrect ? `<div class="answer-detail" style="color:#ef4444;">您的选择：<strong>${userAns.split('').join('、')}</strong></div>` : ''}
              <button class="analysis-toggle" id="analysisToggle">
                查看解析 <span class="arrow">▼</span>
              </button>
              <div class="analysis-content" id="analysisContent">
                <span class="highlight">💡 解析：</span>${q.analysis}
              </div>
            `;

                // 绑定折叠/展开事件
                const toggleBtn = $('#analysisToggle');
                const analysisContent = $('#analysisContent');
                if (toggleBtn && analysisContent) {
                    toggleBtn.addEventListener('click', () => {
                        const isExpanded = analysisContent.classList.contains('show');
                        if (isExpanded) {
                            analysisContent.classList.remove('show');
                            toggleBtn.classList.remove('expanded');
                            toggleBtn.querySelector('.arrow').textContent = '▼';
                        } else {
                            analysisContent.classList.add('show');
                            toggleBtn.classList.add('expanded');
                            toggleBtn.querySelector('.arrow').textContent = '▲';
                        }
                    });
                    // 默认展开
                    analysisContent.classList.add('show');
                    toggleBtn.classList.add('expanded');
                    toggleBtn.querySelector('.arrow').textContent = '▲';
                }
            }

            // ============ 导航 ============
            function goToQuestion(index) {
                if (index < 0 || index >= TOTAL) return;
                currentIndex = index;
                // 清理非当前多选题的临时选择
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    if (q.type === 'multi' && i !== currentIndex && !answerStatus.hasOwnProperty(q.id)) {
                        if (multiSelectTemp[q.id] && multiSelectTemp[q.id].size > 0 && !userAnswers[q.id]) {
                            // 保留已确认的，清理未确认的
                            if (!answerStatus.hasOwnProperty(q.id)) {
                                multiSelectTemp[q.id] = new Set();
                            }
                        }
                    }
                }
                renderQuestion();
                mainScroll.scrollTop = 0;
            }

            function goNext() {
                if (currentIndex < TOTAL - 1) {
                    goToQuestion(currentIndex + 1);
                }
            }

            function goPrev() {
                if (currentIndex > 0) {
                    goToQuestion(currentIndex - 1);
                }
            }

            // ============ 概览弹窗 ============
            function renderOverview() {
                overviewGrid.innerHTML = '';
                let lastSection = '';
                const sections = ['单项选择题', '多项选择题', '判断题'];

                allQuestions.forEach((q, idx) => {
                    if (q.section !== lastSection) {
                        lastSection = q.section;
                        const divider = document.createElement('div');
                        divider.className = 'section-divider';
                        divider.textContent = q.section;
                        overviewGrid.appendChild(divider);
                    }
                    const dot = document.createElement('div');
                    dot.className = 'overview-dot';
                    dot.textContent = q.id;
                    dot.setAttribute('data-index', idx);
                    if (idx === currentIndex) {
                        dot.classList.add('current');
                    }
                    if (answerStatus.hasOwnProperty(q.id) && answerStatus[q.id] === 'correct') {
                        dot.classList.add('done-correct');
                    } else if (answerStatus.hasOwnProperty(q.id) && answerStatus[q.id] === 'wrong') {
                        dot.classList.add('done-wrong');
                    }
                    dot.addEventListener('click', () => {
                        closeOverlay();
                        goToQuestion(idx);
                    });
                    overviewGrid.appendChild(dot);
                });
            }

            function openOverlay() {
                overlay.style.display = 'flex';
                renderOverview();
                document.body.style.overflow = 'hidden';
            }

            function closeOverlay() {
                overlay.style.display = 'none';
                document.body.style.overflow = '';
            }

            // ============ 字体调整 ============
            function cycleFontSize() {
                const levels = ['small', 'medium', 'large'];
                const currentIdx = levels.indexOf(fontLevel);
                const nextIdx = (currentIdx + 1) % levels.length;
                fontLevel = levels[nextIdx];
                document.body.setAttribute('data-font', fontLevel);
                // 更新按钮文字
                const labels = { small: '小', medium: '中', large: '大' };
                btnFontSize.textContent = labels[fontLevel];
                saveProgress();
            }

            function applyFontLevel() {
                document.body.setAttribute('data-font', fontLevel);
                const labels = { small: '小', medium: '中', large: '大' };
                btnFontSize.textContent = labels[fontLevel];
            }

            // ============ 事件绑定 ============
            btnPrev.addEventListener('click', goPrev);
            btnNext.addEventListener('click', goNext);
            btnBack.addEventListener('click', openOverlay);
            btnFontSize.addEventListener('click', cycleFontSize);
            btnOverview.addEventListener('click', openOverlay);
            btnCloseOverlay.addEventListener('click', closeOverlay);
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeOverlay();
            });
            btnConfirm.addEventListener('click', handleMultiConfirm);

            // 键盘导航（PC端辅助）
            document.addEventListener('keydown', (e) => {
                if (overlay.style.display === 'flex') {
                    if (e.key === 'Escape') closeOverlay();
                    return;
                }
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    goNext();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    goPrev();
                }
            });

            // 触摸滑动（可选：左右滑动切换题目）
            let touchStartX = 0;
            let touchStartY = 0;
            mainScroll.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            mainScroll.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx < -40) goNext();
                    else if (dx > 40) goPrev();
                }
            });

            // ============ 初始化 ============
            function init() {
                loadProgress();
                applyFontLevel();
                // 确保multiSelectTemp初始化
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    if (q.type === 'multi' && !multiSelectTemp[q.id]) {
                        multiSelectTemp[q.id] = new Set();
                    }
                }
                // 恢复已答题的多选临时状态
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    if (q.type === 'multi' && userAnswers[q.id] && answerStatus.hasOwnProperty(q.id)) {
                        multiSelectTemp[q.id] = new Set(userAnswers[q.id].split(''));
                    }
                }
                renderQuestion();
                // PC端提示
                if (window.innerWidth > 768) {
                    console.log('💡 提示：使用键盘左右方向键可切换题目');
                }
            }

            init();
        })();
    </script>
</body>
</html>
