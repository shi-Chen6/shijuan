                        const correctAnswerChars = question.answer.split('');
                        if (correctAnswerChars.includes(key)) {
                            optDiv.classList.add('correct-answer');
                        }
                        if (isMulti) {
                            if (selectedOptions.includes(key) && !correctAnswerChars.includes(key)) {
                                optDiv.classList.add('wrong-answer');
                            }
                        } else {
                            if (singleSelected === key && !correctAnswerChars.includes(key)) {
                                optDiv.classList.add('wrong-answer');
                            }
                        }
                    } else {
                        // 未提交，显示选中状态
                        if (isMulti && selectedOptions.includes(key)) {
                            optDiv.classList.add('selected');
                        } else if (!isMulti && singleSelected === key) {
                            optDiv.classList.add('selected');
                        }
                    }

                    optDiv.innerHTML = `
                <span class="option-letter">${key}</span>
                <span>${question.options[key]}</span>
                <span class="option-check">${hasSubmitted && question.answer.split('').includes(key) ? '✓' : (optDiv.classList.contains('selected') && !hasSubmitted ? '●' : '')}</span>
              `;

                    optDiv.addEventListener('click', () => handleOptionClick(key, question, hasSubmitted));
                    $optionsList.appendChild(optDiv);
                });

                // 多选提交按钮
                if (isMulti && !hasSubmitted) {
                    $submitBtnWrap.classList.add('visible');
                    $btnSubmitMulti.disabled = selectedOptions.length === 0;
                } else {
                    $submitBtnWrap.classList.remove('visible');
                }

                // 解析区域
                if (hasSubmitted) {
                    const isCorrect = status === 'correct';
                    $analysisBox.classList.add('visible');
                    $analysisBox.classList.remove('correct-box', 'wrong-box');
                    $analysisBox.classList.add(isCorrect ? 'correct-box' : 'wrong-box');
                    $analysisLabel.textContent = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
                    $analysisText.textContent = `正确答案：${question.answer}。${question.analysis}`;
                } else {
                    $analysisBox.classList.remove('visible', 'correct-box', 'wrong-box');
                }

                // 导航按钮
                updateNavButtons();
                updateStatsDisplay();
                updateProgressBar();
                saveProgress();
                updateReviewBanner();
            }

            function handleOptionClick(key, question, hasSubmitted) {
                if (hasSubmitted) return; // 已提交不可更改

                const realIdx = getCurrentRealIndex();
                if (realIdx < 0) return;

                if (question.type === 'multiple') {
                    // 多选：切换选项
                    let currentSelection = userAnswers[realIdx] ? userAnswers[realIdx].split('') : [];
                    if (currentSelection.includes(key)) {
                        currentSelection = currentSelection.filter(k => k !== key);
                    } else {
                        currentSelection.push(key);
                    }
                    if (currentSelection.length === 0) {
                        delete userAnswers[realIdx];
                    } else {
                        userAnswers[realIdx] = sortAnswer(currentSelection.join(''));
                    }
                    // 更新提交按钮状态
                    $btnSubmitMulti.disabled = currentSelection.length === 0;
                    renderQuestion();
                } else {
                    // 单选/判断：直接提交
                    userAnswers[realIdx] = key;
                    submitCurrentAnswer();
                    renderQuestion();
                }
            }

            function submitCurrentAnswer() {
                const realIdx = getCurrentRealIndex();
                if (realIdx < 0) return;
                const question = allQuestions[realIdx];
                const userAns = userAnswers[realIdx];
                if (!userAns) return;
                const correct = isAnswerCorrect(question, userAns);
                answeredStatus[realIdx] = correct ? 'correct' : 'wrong';
                // 如果是复习模式且答对了，从错题本移除
                if (isReviewMode && correct) {
                    removeFromWrongBook(realIdx);
                }
                saveWrongBook();
                saveProgress();
                saveExamStatsForIndex(); // 保存与index.html兼容的统计数据
            }

            function handleMultiSubmit() {
                const realIdx = getCurrentRealIndex();
                if (realIdx < 0) return;
                const userAns = userAnswers[realIdx];
                if (!userAns || userAns.length === 0) return;
                submitCurrentAnswer();
                renderQuestion();
            }

            function updateNavButtons() {
                const total = getTotalQuestions();
                const pos = isReviewMode ? reviewCurrentPos : currentIndex;
                $btnPrev.disabled = pos <= 0;
                $btnNext.disabled = pos >= total - 1;
                if (total === 0) {
                    $btnPrev.disabled = true;
                    $btnNext.disabled = true;
                }
            }

            function updateStatsDisplay() {
                $correctCount.textContent = getCorrectCount();
                $wrongCount.textContent = getWrongCount();
                $progressText.textContent = `${getAnsweredCount()}/${getTotalAllQuestions()}`;
            }

            function updateProgressBar() {
                const total = getTotalAllQuestions();
                const answered = getAnsweredCount();
                const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
                $progressBar.style.width = pct + '%';
            }

            function updateReviewBanner() {
                if (isReviewMode) {
                    $reviewBanner.classList.remove('hidden');
                    $reviewCount.textContent = reviewQueue.length;
                } else {
                    $reviewBanner.classList.add('hidden');
                }
            }

            // ==================== 导航 ====================
            function goToPrev() {
                if (isReviewMode) {
                    if (reviewCurrentPos > 0) {
                        reviewCurrentPos--;
                    }
                } else {
                    if (currentIndex > 0) {
                        currentIndex--;
                    }
                }
                renderQuestion();
                scrollToTop();
            }

            function goToNext() {
                const total = getTotalQuestions();
                const pos = isReviewMode ? reviewCurrentPos : currentIndex;
                if (pos < total - 1) {
                    if (isReviewMode) {
                        reviewCurrentPos++;
                    } else {
                        currentIndex++;
                    }
                    renderQuestion();
                    scrollToTop();
                } else if (!isReviewMode && pos >= total - 1) {
                    // 全部答完，自动保存历史
                    checkCompletionAndSave();
                }
            }

            function goToIndex(index) {
                if (isReviewMode) {
                    const posInQueue = reviewQueue.indexOf(index);
                    if (posInQueue >= 0) {
                        reviewCurrentPos = posInQueue;
                    } else {
                        // 不在复习队列中，退出复习模式跳转
                        exitReviewMode();
                        if (index >= 0 && index < allQuestions.length) {
                            currentIndex = index;
                        }
                    }
                } else {
                    if (index >= 0 && index < allQuestions.length) {
                        currentIndex = index;
                    }
                }
                renderQuestion();
                scrollToTop();
                closePanel();
            }

            function scrollToTop() {
                $mainContent.scrollTop = 0;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function checkCompletionAndSave() {
                const answered = getAnsweredCount();
                const total = getTotalAllQuestions();
                if (answered >= total && total > 0 && !isReviewMode) {
                    saveHistoryRecord();
                }
            }

            // ==================== 复习模式 ====================
            function startReviewMode() {
                const wb = getWrongBookRaw();
                if (wb.length === 0) {
                    showToast('错题本为空，暂无需要复习的题目 😊');
                    return;
                }
                // 过滤掉无效索引
                const validQueue = wb.filter(i => i >= 0 && i < allQuestions.length);
                if (validQueue.length === 0) {
                    // 清空错题本
                    try { localStorage.setItem(STORAGE_KEY_WRONG_BOOK, JSON.stringify([])); } catch (e) {}
                    updateWrongBookBadge();
                    showToast('错题本已清空（题目数据已更新）');
                    return;
                }
                isReviewMode = true;
                reviewQueue = validQueue;
                reviewCurrentPos = 0;
                // 清除复习题目的旧答案状态（可选：保留以便参考）
                // 这里我们清除answeredStatus中复习队列的题目状态，让用户重新作答
                for (const idx of reviewQueue) {
                    delete answeredStatus[idx];
                    delete userAnswers[idx];
                }
                saveProgress();
                saveWrongBook();
                closePanel();
                renderQuestion();
                scrollToTop();
                showToast(`进入复习模式，共 ${reviewQueue.length} 题`);
            }

            function exitReviewMode() {
                isReviewMode = false;
                reviewQueue = [];
                reviewCurrentPos = 0;
                saveProgress();
                updateReviewBanner();
                renderQuestion();
                scrollToTop();
            }

            function checkReviewComplete() {
                if (!isReviewMode) return;
                const allReviewed = reviewQueue.every(idx => answeredStatus[idx] !== undefined);
                if (allReviewed) {
                    const remainingWrong = reviewQueue.filter(idx => answeredStatus[idx] === 'wrong');
                    if (remainingWrong.length === 0) {
                        showToast('🎉 复习完成！所有错题都已答对！');
                        exitReviewMode();
                    } else {
                        showToast(`复习完成，还有 ${remainingWrong.length} 题仍需加强。可再次进入复习模式。`);
                        // 更新reviewQueue只包含仍然错误的题目
                        reviewQueue = remainingWrong;
                        reviewCurrentPos = 0;
                        if (reviewQueue.length === 0) {
                            exitReviewMode();
                        } else {
                            // 清除已答对的
                            for (const idx of reviewQueue) {
                                delete answeredStatus[idx];
                                delete userAnswers[idx];
                            }
                            saveProgress();
                            renderQuestion();
                        }
                    }
                }
            }

            // ==================== 面板 ====================
            function openPanel(htmlContent) {
                $panelContent.innerHTML = htmlContent;
                $overlayPanel.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function closePanel() {
                $overlayPanel.classList.add('hidden');
                document.body.style.overflow = '';
            }

            function showQuestionListPanel() {
                const partLabels = {
                    1: '📌 第一部分 单选题',
                    2: '☑️ 第二部分 多选题',
                    3: '⚖️ 第三部分 判断题'
                };

                let gridHTML = '';
                for (const part of [1, 2, 3]) {
                    const partQuestions = allQuestions.filter((q, idx) => q.part === part);
                    gridHTML += `<div style="margin-bottom:16px;">`;
                    gridHTML += `<div style="font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:8px;padding-left:8px;border-left:3px solid var(--primary);">${partLabels[part]} (${partQuestions.length}题)</div>`;
                    gridHTML += '<div class="question-grid">';
                    for (const q of partQuestions) {
                        const i = allQuestions.indexOf(q);
                        let cls = 'q-grid-item';
                        if (!isReviewMode && i === currentIndex) cls += ' current';
                        if (isReviewMode && reviewQueue.includes(i) && reviewQueue[reviewCurrentPos] === i) cls += ' current';
                        if (answeredStatus[i] === 'correct') cls += ' answered-correct';
                        else if (answeredStatus[i] === 'wrong') cls += ' answered-wrong';
                        else if (userAnswers[i] && !answeredStatus[i]) cls += ' answered-pending';
                        if (isReviewMode && reviewQueue.includes(i) && answeredStatus[i] === undefined) cls += ' answered-pending';
                        gridHTML += `<div class="${cls}" data-index="${i}" title="题号 ${q.num}">${q.num}</div>`;
                    }
                    gridHTML += '</div>';
                    gridHTML += '</div>';
                }

                gridHTML += '<p style="margin-top:12px;font-size:0.78rem;color:var(--text-muted);text-align:center;">🟢 答对 · 🔴 答错 · 🟡 已选未判 · ⬜ 未答 · <span style="border:2px solid var(--primary);border-radius:4px;padding:0 4px;">边框</span> 当前</p>';
                if (isReviewMode) {
                    gridHTML += '<p style="margin-top:4px;font-size:0.78rem;color:var(--wrong);text-align:center;">🔁 复习模式中</p>';
                    gridHTML += `<button class="btn-submit" style="margin-top:10px;background:var(--text-secondary);" id="btnExitReview">退出复习模式</button>`;
                }

                const html = `
              <div class="panel-header">
                <span class="panel-title">📋 题目列表</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              ${gridHTML}
            `;
                openPanel(html);

                document.getElementById('btnClosePanel').addEventListener('click', closePanel);
                document.querySelectorAll('.q-grid-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const idx = parseInt(this.getAttribute('data-index'));
                        goToIndex(idx);
                    });
                });
                if (isReviewMode) {
                    const btnExit = document.getElementById('btnExitReview');
                    if (btnExit) btnExit.addEventListener('click', () => { closePanel(); exitReviewMode(); });
                }
            }

            function showWrongBookPanel() {
                const wb = getWrongBookRaw();
                const validWb = wb.filter(i => i >= 0 && i < allQuestions.length);
                let listHTML = '';
                if (validWb.length === 0) {
                    listHTML = '<div class="empty-state"><span class="empty-icon">📕</span><p>错题本为空</p><p style="font-size:0.8rem;color:var(--text-muted);">答错的题目会自动收录</p></div>';
                } else {
                    for (const idx of validWb) {
                        const q = allQuestions[idx];
                        const userAns = userAnswers[idx] || '未作答';
                        listHTML += `
                  <div class="wrong-item" data-index="${idx}">
                    <span class="wrong-q-num">#${q.num}</span>
                    <span>${q.question.substring(0, 40)}${q.question.length > 40 ? '...' : ''}</span>
                    <span style="float:right;font-size:0.75rem;color:var(--text-muted);">你的答案: ${userAns} | 正确: ${q.answer}</span>
                  </div>
                `;
                    }
                }

                const html = `
              <div class="panel-header">
                <span class="panel-title">📕 错题本 (${validWb.length}题)</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              ${listHTML}
              ${validWb.length > 0 ? `<button class="btn-submit" style="margin-top:12px;" id="btnStartReview">🔁 开始复习错题</button>
              <button class="btn-submit" style="margin-top:8px;background:var(--text-secondary);" id="btnClearWrongBook">🗑️ 清空错题本</button>` : ''}
            `;
                openPanel(html);

                document.getElementById('btnClosePanel').addEventListener('click', closePanel);
                if (validWb.length > 0) {
                    document.getElementById('btnStartReview').addEventListener('click', () => {
                        closePanel();
                        startReviewMode();
                    });
                    document.getElementById('btnClearWrongBook').addEventListener('click', () => {
                        if (confirm('确定要清空错题本吗？此操作不可恢复。')) {
                            try { localStorage.setItem(STORAGE_KEY_WRONG_BOOK, JSON.stringify([])); } catch
                            (e) {}
                            updateWrongBookBadge();
                            closePanel();
                            showToast('错题本已清空');
                        }
                    });
                }
                document.querySelectorAll('.wrong-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const idx = parseInt(this.getAttribute('data-index'));
                        goToIndex(idx);
                    });
                });
            }

            function showReportPanel() {
                const typeStats = getTypeStats();
                const partStats = getPartStats();
                const totalAnswered = getAnsweredCount();
                const totalCorrect = getCorrectCount();
                const totalAll = getTotalAllQuestions();
                const overallRate = totalAll > 0 ? Math.round((totalCorrect / totalAll) * 100) : 0;

                let typeHTML = '';
                const typeLabels = { 'single': '单选题', 'multiple': '多选题', 'judge': '判断题' };
                for (const [type, stats] of Object.entries(typeStats)) {
                    const rate = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                    const barClass = rate >= 80 ? 'good-fill' : rate >= 50 ? 'neutral-fill' : 'bad-fill';
                    typeHTML += `
                <div class="stat-row">
                  <span>${typeLabels[type] || type}</span>
                  <span class="stat-val ${rate >= 80 ? 'good' : rate < 50 ? 'bad' : ''}">${stats.correct}/${stats.total} (${rate}%)</span>
                </div>
                <div class="mini-bar"><div class="mini-bar-fill ${barClass}" style="width:${rate}%"></div></div>
              `;
                }

                let partHTML = '';
                for (const [part, stats] of Object.entries(partStats)) {
                    const rate = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                    const barClass = rate >= 80 ? 'good-fill' : rate >= 50 ? 'neutral-fill' : 'bad-fill';
                    partHTML += `
                <div class="stat-row">
                  <span>第${part}部分</span>
                  <span class="stat-val ${rate >= 80 ? 'good' : rate < 50 ? 'bad' : ''}">${stats.correct}/${stats.total} (${rate}%)</span>
                </div>
                <div class="mini-bar"><div class="mini-bar-fill ${barClass}" style="width:${rate}%"></div></div>
              `;
                }

                const html = `
              <div class="panel-header">
                <span class="panel-title">📊 答题报告</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              <div style="text-align:center;margin-bottom:16px;">
                <div style="font-size:3rem;font-weight:800;color:${overallRate >= 80 ? 'var(--correct)' : overallRate >= 50 ? 'var(--primary)' : 'var(--wrong)'};">${overallRate}%</div>
                <div style="font-size:0.85rem;color:var(--text-secondary);">总体正确率 · 已答${totalAnswered}/${totalAll}题 · 正确${totalCorrect}题</div>
              </div>
              <div class="report-section">
                <h3>📂 按题型分类</h3>
                ${typeHTML}
              </div>
              <div class="report-section">
                <h3>📑 按部分分类</h3>
                ${partHTML}
              </div>
              ${isReviewMode ? '<p style="text-align:center;color:var(--wrong);font-size:0.85rem;">🔁 当前为复习模式，统计仅包含已判定题目</p>' : ''}
            `;
                openPanel(html);
                document.getElementById('btnClosePanel').addEventListener('click', closePanel);
            }

            function showHistoryPanel() {
                const history = getHistoryRaw();
                let listHTML = '';
                if (history.length === 0) {
                    listHTML =
                        '<div class="empty-state"><span class="empty-icon">📁</span><p>暂无历史记录</p><p style="font-size:0.8rem;color:var(--text-muted);">完成答题后自动保存</p></div>';
                } else {
                    for (const rec of history) {
                        const scoreColor = rec.score >= 80 ? 'var(--correct)' : rec.score >= 50 ? 'var(--primary)' :
                            'var(--wrong)';
                        listHTML += `
                  <div class="history-item" data-id="${rec.id}">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                      <span class="history-date">📅 ${rec.date}</span>
                      <span class="history-score" style="color:${scoreColor};">${rec.score}%</span>
                    </div>
                    <div style="font-size:0.78rem;color:var(--text-muted);">正确${rec.correctCount}/${rec.totalQuestions}题 · 答错${rec.wrongCount}题 · 共答${rec.answeredCount}题</div>
                  </div>
                `;
                    }
                    listHTML +=
                        '<button class="btn-submit" style="margin-top:12px;background:var(--wrong);" id="btnClearHistory">🗑️ 清空历史记录</button>';
                }

                const html = `
              <div class="panel-header">
                <span class="panel-title">📁 历史记录 (${history.length}条)</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              ${listHTML}
            `;
                openPanel(html);
                document.getElementById('btnClosePanel').addEventListener('click', closePanel);
                if (history.length > 0) {
                    document.getElementById('btnClearHistory').addEventListener('click', () => {
                        if (confirm('确定要清空所有历史记录吗？此操作不可恢复。')) {
                            try { localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify([])); } catch
                            (e) {}
                            closePanel();
                            showToast('历史记录已清空');
                        }
                    });
                }
                document.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        showHistoryDetail(id);
                    });
                });
            }

            function showHistoryDetail(id) {
                const history = getHistoryRaw();
                const rec = history.find(r => r.id === id);
                if (!rec) return;
                const scoreColor = rec.score >= 80 ? 'var(--correct)' : rec.score >= 50 ? 'var(--primary)' :
                    'var(--wrong)';
                let detailHTML = `
              <div style="text-align:center;margin-bottom:12px;">
                <div style="font-size:2.5rem;font-weight:800;color:${scoreColor};">${rec.score}%</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">${rec.date}</div>
                <div>正确${rec.correctCount}/${rec.totalQuestions} · 错误${rec.wrongCount} · 已答${rec.answeredCount}</div>
              </div>
            `;
                if (rec.typeStats) {
                    detailHTML += '<div class="report-section"><h3>📂 按题型</h3>';
                    const tl = { 'single': '单选题', 'multiple': '多选题', 'judge': '判断题' };
                    for (const [t, s] of Object.entries(rec.typeStats)) {
                        const r = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                        detailHTML +=
                            `<div class="stat-row"><span>${tl[t]||t}</span><span class="stat-val">${s.correct}/${s.total} (${r}%)</span></div>`;
                    }
                    detailHTML += '</div>';
                }
                if (rec.partStats) {
                    detailHTML += '<div class="report-section"><h3>📑 按部分</h3>';
                    for (const [p, s] of Object.entries(rec.partStats)) {
                        const r = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                        detailHTML +=
                            `<div class="stat-row"><span>第${p}部分</span><span class="stat-val">${s.correct}/${s.total} (${r}%)</span></div>`;
                    }
                    detailHTML += '</div>';
                }

                const html = `
              <div class="panel-header">
                <span class="panel-title">📋 记录详情</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              ${detailHTML}
              <button class="btn-submit" style="margin-top:10px;background:var(--text-secondary);" id="btnBackToHistory">← 返回列表</button>
            `;
                openPanel(html);
                document.getElementById('btnClosePanel').addEventListener('click', closePanel);
                document.getElementById('btnBackToHistory').addEventListener('click', () => {
                    showHistoryPanel();
                });
            }

            function showSettingsPanel() {
                const html = `
              <div class="panel-header">
                <span class="panel-title">⚙️ 设置</span>
                <button class="panel-close" id="btnClosePanel">✕</button>
              </div>
              <div class="setting-row">
                <span>🌓 深色主题</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="toggleTheme" ${settings.theme === 'dark' ? 'checked' : ''}>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="setting-row">
                <span>🔤 字体大小</span>
                <div class="font-size-btns">
                  <button class="font-size-btn ${settings.fontSize === 'small' ? 'active-size' : ''}" data-size="small">S</button>
                  <button class="font-size-btn ${settings.fontSize === 'medium' ? 'active-size' : ''}" data-size="medium">M</button>
                  <button class="font-size-btn ${settings.fontSize === 'large' ? 'active-size' : ''}" data-size="large">L</button>
                </div>
              </div>
              <div class="setting-row">
                <span>📊 当前进度</span>
                <span style="font-size:0.85rem;color:var(--text-secondary);">已答${getAnsweredCount()}/${getTotalAllQuestions()}题</span>
              </div>
              <button class="btn-submit" style="margin-top:12px;background:var(--wrong);" id="btnResetAll">🔄 重置所有进度</button>
            `;
                openPanel(html);
                document.getElementById('btnClosePanel').addEventListener('click', closePanel);

                document.getElementById('toggleTheme').addEventListener('change', function() {
                    settings.theme = this.checked ? 'dark' : 'light';
                    applySettings();
                });

                document.querySelectorAll('.font-size-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        settings.fontSize = this.getAttribute('data-size');
                        applySettings();
                        document.querySelectorAll('.font-size-btn').forEach(b => b.classList
                            .remove('active-size'));
                        this.classList.add('active-size');
                    });
                });

                document.getElementById('btnResetAll').addEventListener('click', () => {
                    if (confirm('确定要重置所有进度吗？这将清除当前答题进度、错题本和历史记录。')) {
                        resetProgress();
                        try { localStorage.setItem(STORAGE_KEY_WRONG_BOOK, JSON.stringify([])); } catch
                        (e) {}
                        try { localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify([])); } catch (e) {}
                        updateWrongBookBadge();
                        closePanel();
                        renderQuestion();
                        showToast('所有进度已重置');
                    }
                });
            }

            // ==================== Toast ====================
            function showToast(message) {
                // 移除已有toast
                const existing = document.querySelector('.toast-msg');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = 'toast-msg';
                toast.textContent = message;
                toast.style.cssText = `
              position: fixed;
              top: 20px;
              left: 50%;
              transform: translateX(-50%);
              z-index: 9999;
              background: var(--text);
              color: var(--bg-card);
              padding: 10px 20px;
              border-radius: 25px;
              font-weight: 600;
              font-size: 0.9rem;
              box-shadow: 0 8px 25px rgba(0,0,0,0.25);
              animation: fadeSlideIn 0.3s ease;
              pointer-events: none;
              max-width: 90vw;
              text-align: center;
              font-family: var(--font-sans);
            `;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }

            // ==================== 事件绑定 ====================
            $btnPrev.addEventListener('click', goToPrev);
            $btnNext.addEventListener('click', goToNext);
            $btnSubmitMulti.addEventListener('click', handleMultiSubmit);
            $btnSettings.addEventListener('click', showSettingsPanel);

            document.getElementById('btnQuestionList').addEventListener('click', showQuestionListPanel);
            document.getElementById('btnWrongBook').addEventListener('click', showWrongBookPanel);
            document.getElementById('btnReport').addEventListener('click', showReportPanel);
            document.getElementById('btnHistory').addEventListener('click', showHistoryPanel);
            document.getElementById('btnReset').addEventListener('click', () => {
                if (confirm('确定要重新开始吗？当前进度将丢失，但错题本和历史记录会保留。')) {
                    resetProgress();
                    renderQuestion();
                    scrollToTop();
                    showToast('已重新开始，错题本和历史已保留');
                }
            });

            // 覆盖层点击关闭
            $overlayPanel.addEventListener('click', function(e) {
                if (e.target === $overlayPanel) {
                    closePanel();
                }
            });

            // 键盘导航
            document.addEventListener('keydown', function(e) {
                if ($overlayPanel.classList.contains('hidden')) {
                    if (e.key === 'ArrowLeft') goToPrev();
                    if (e.key === 'ArrowRight') goToNext();
                    if (e.key === 'Escape' && isReviewMode) exitReviewMode();
                } else {
                    if (e.key === 'Escape') closePanel();
                }
            });

            // ==================== 初始化 ====================
            function init() {
                loadSettings();
                loadProgress();
                updateWrongBookBadge();
                renderQuestion();
                updateStatsDisplay();
                updateProgressBar();
                updateReviewBanner();
                // 检查是否全部完成
                checkCompletionAndSave();
            }

            init();

            console.log('📝 在线答题系统已就绪');
            console.log(`   - ${allQuestions.length} 道题目 (单选/多选/判断)`);
            console.log('   - 支持深色/浅色主题切换');
            console.log('   - 支持字体大小调节');
            console.log('   - 错题本 & 复习模式');
            console.log('   - 历史记录 & 答题报告');
            console.log('   - 本地存储自动保存进度');
            console.log('   ⌨️ 键盘快捷键: ← → 导航, Esc 关闭面板/退出复习');
        })();
    </script>
</body>
</html>
