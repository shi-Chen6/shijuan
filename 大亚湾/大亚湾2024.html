    { type: 'judge', part: 2, num: 92, question: '当出现情绪不良现象时，小张喜欢跑到空旷的地方放声大哭一场，释放内心的压抑，这属于正常的心理宣泄。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '哭泣式宣泄是良性心理宣泄的一种方式，有利于不良情绪的缓解和消除。' },
    { type: 'judge', part: 2, num: 93, question: '多血质的学生具有的特点是：有朝气、热情、活泼、爱交际、有同情心、思想灵活，但变化无常、浮躁、缺乏一贯性。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '多血质的人活泼好动、反应迅速、热爱交际、适应性强，但稳定性差、缺少耐性、见异思迁。' },
    { type: 'judge', part: 2, num: 94, question: '内化说是维果斯基心理发展观的核心思想之一。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '维果斯基认为心理发展是从低级心理机能向高级心理机能转化的过程，内化学说是其心理发展观的核心思想。' },
    { type: 'judge', part: 2, num: 95, question: '学生在语文课上学会了端坐认真做作业，在数学课上也能做出类似行为。这表明了该学生的学习行为存在泛化。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '刺激泛化指对与条件刺激相类似的刺激也能诱发条件反应。语文课上的行为迁移到数学课上，属于刺激泛化。' },
    { type: 'judge', part: 2, num: 96, question: '顺从就是无论表面上还是认识和情感上都接受他人的意见或观点。（）', options: { A: '正确', B: '错误' }, answer: 'B', analysis: '顺从是在行为上接受他人请求，但在思想和态度上并未随之改变。题干描述的是认同或内化。' },
    { type: 'judge', part: 2, num: 97, question: '反思性教学要求教师从教学技术上思考、质疑或评价自己教学的有效性，运用反思的结果矫正不良教学行为，并在今后实践中加以运用。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '反思性教学帮助教师从教学技术角度思考评价教学，运用反思结果矫正不良行为，指导未来实践。' },
    { type: 'judge', part: 2, num: 98, question: '社会组织或个人依法举办的民办学校实施义务教育的，依照《中华人民共和国民办教育促进法》的有关规定执行。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '《义务教育法》第六十二条规定，社会组织或个人依法举办的民办学校实施义务教育的，依照民办教育促进法执行。' },
    { type: 'judge', part: 2, num: 99, question: '申请认定教师资格证的普通话水平测试等级标准要在二级乙等以上标准。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '《教师资格条例》实施办法规定，普通话水平应达到二级乙等以上标准。' },
    { type: 'judge', part: 2, num: 100, question: '教师接受学生自绘贺卡，不违背教师职业道德规范。（）', options: { A: '正确', B: '错误' }, answer: 'A', analysis: '学生自绘贺卡表达敬意，不涉及利益输送，教师可以接受，不违背教师职业道德。' }
];

            const TOTAL = allQuestions.length;

            // ==================== 状态管理 ====================
            const STORAGE_KEY = 'teacher_exam_progress_v2_dayawan2023';
            const HISTORY_KEY = 'teacher_exam_history_v2_dayawan2023';
            const STATS_KEY = 'exam_stats_dayawan2023';
            let currentIndex = 0;
            let userAnswers = {}; 
            let revealedAnswers = {}; 
            let fontSizeLevel = 1; 
            let mistakeMode = false;
            let mistakeList = [];
            const fontSizeLabels = ['小', '中', '大', '特大', '特特大', '特特特大'];
            const fontSizeBodyValues = ['14px', '16px', '18px', '20px', '22px', '24px'];
            const fontSmValues = ['12px', '14px', '15px', '16px', '18px', '20px'];

            function loadProgress() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (typeof data.currentIndex === 'number') currentIndex = data.currentIndex;
                        if (data.userAnswers) userAnswers = data.userAnswers;
                        if (data.revealedAnswers) revealedAnswers = data.revealedAnswers;
                        if (typeof data.fontSizeLevel === 'number') fontSizeLevel = data.fontSizeLevel;
                        if (typeof data.mistakeMode === 'boolean') mistakeMode = data.mistakeMode;
                        if (data.mistakeList) mistakeList = data.mistakeList;
                    }
                } catch (e) {
                    // ignore
                }
                if (currentIndex < 0 || currentIndex >= TOTAL) currentIndex = 0;
            }

            function saveProgress() {
                try {
                    const data = { currentIndex, userAnswers, revealedAnswers, fontSizeLevel, mistakeMode, mistakeList };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    
                    const statsObj = {
                        total: TOTAL,
                        answered: getAnsweredCount(),
                        wrong: getWrongCount(),
                        wrongQuestions: generateMistakeList().map((idx, i) => ({ id: idx + 1, num: allQuestions[idx].num }))
                    };
                    localStorage.setItem(STATS_KEY, JSON.stringify(statsObj));
                } catch (e) {}
            }

            function getWrongCount() {
                let count = 0;
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    const ua = userAnswers[i];
                    if (!ua) continue;
                    if (q.type === 'multiple') {
                        const correctSet = q.answer.split('').sort().join('');
                        const userSet = [...ua].sort().join('');
                        if (correctSet !== userSet) count++;
                    } else {
                        if (ua !== q.answer) count++;
                    }
                }
                return count;
            }

            // 新增：保存当前记录到历史
            function archiveCurrentToHistory() {
                const answered = getAnsweredCount();
                if (answered > 0) {
                    const record = {
                        id: Date.now(),
                        date: new Date().toLocaleString(),
                        answered: answered,
                        correct: getCorrectCount(),
                        mistakes: generateMistakeList(),
                        userAnswers: JSON.parse(JSON.stringify(userAnswers)),
                        revealedAnswers: JSON.parse(JSON.stringify(revealedAnswers))
                    };
                    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                    history.unshift(record); // 最新记录在最前
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                }
            }

            function getUserAnswer(index) { return userAnswers[index] || null; }
            function setUserAnswer(index, answer) { userAnswers[index] = answer; saveProgress(); }
            function isRevealed(index) { return !!revealedAnswers[index]; }
            function setRevealed(index) { revealedAnswers[index] = true; saveProgress(); }

            function getAnsweredCount() {
                return Object.keys(userAnswers).filter(k => userAnswers[k] !== null && userAnswers[k] !== undefined &&
                    (typeof userAnswers[k] === 'string' ? userAnswers[k].length > 0 : userAnswers[k].length > 0)).length;
            }

            function getCorrectCount() {
                let count = 0;
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    const ua = userAnswers[i];
                    if (!ua) continue;
                    if (q.type === 'multiple') {
                        const correctSet = q.answer.split('').sort().join('');
                        const userSet = [...ua].sort().join('');
                        if (correctSet === userSet) count++;
                    } else {
                        if (ua === q.answer) count++;
                    }
                }
                return count;
            }

            // ==================== DOM 元素 ====================
            const $ = (sel) => document.querySelector(sel);
            const sectionLabel = $('#sectionLabel');
            const questionNum = $('#questionNum');
            const questionText = $('#questionText');
            const typeBadge = $('#typeBadge');
            const optionsArea = $('#optionsArea');
            const submitMultiBtn = $('#submitMultiBtn');
            const resultArea = $('#resultArea');
            const resultHeader = $('#resultHeader');
            const correctAnswerDisplay = $('#correctAnswerDisplay');
            const analysisToggle = $('#analysisToggle');
            const analysisContent = $('#analysisContent');
            const prevBtn = $('#prevBtn');
            const nextBtn = $('#nextBtn');
            const progressBar = $('#progressBar');
            const progressText = $('#progressText');
            const correctRate = $('#correctRate');
            const overlay = $('#overlay');
            const sheetGrid = $('#sheetGrid');
            const toast = $('#toast');

            // ==================== 渲染函数 ====================
            function getPartLabel(part) {
                if (part === 1) return '第一部分 单选题';
                if (part === 2) return '第二部分 多选题';
                if (part === 3) return '第三部分 判断题';
                return '';
            }

            function getTypeBadgeClass(type) {
                if (type === 'single') return 'badge-single';
                if (type === 'multiple') return 'badge-multiple';
                return 'badge-judge';
            }

            function getTypeLabel(type) {
                if (type === 'single') return '单选题';
                if (type === 'multiple') return '多选题';
                return '判断题';
            }

            function applyFontSize() {
                const bodyVal = fontSizeBodyValues[fontSizeLevel];
                const smVal = fontSmValues[fontSizeLevel];
                document.documentElement.style.setProperty('--font-base', bodyVal);
                document.documentElement.style.setProperty('--font-sm', smVal);
                $('#fontSizeIndicator').textContent = fontSizeLabels[fontSizeLevel];
                if (questionText) questionText.style.fontSize = bodyVal;
                if (analysisContent && analysisContent.classList.contains('expanded')) analysisContent.style.fontSize = smVal;
                document.querySelectorAll('.option-text').forEach(el => el.style.fontSize = bodyVal);
            }

            function renderQuestion() {
                const q = allQuestions[currentIndex];
                sectionLabel.textContent = getPartLabel(q.part);
                if (mistakeMode) {
                    let currentPos = mistakeList.indexOf(currentIndex);
                    questionNum.textContent = `错题复习 ${currentPos + 1}/${mistakeList.length} (原题 ${q.num})`;
                } else {
                    questionNum.textContent = `第 ${q.num}/110 题`;
                }
                typeBadge.textContent = getTypeLabel(q.type);
                typeBadge.className = 'question-type-badge ' + getTypeBadgeClass(q.type);
                questionText.innerHTML = `<span class="qn-inline">${q.num}.</span> ${q.question}`;
                questionText.style.fontSize = fontSizeBodyValues[fontSizeLevel];

                // 渲染选项
                optionsArea.innerHTML = '';
                const optionKeys = Object.keys(q.options);
                const isMulti = q.type === 'multiple';
                const revealed = isRevealed(currentIndex);
                const userAns = getUserAnswer(currentIndex);

                optionKeys.forEach(key => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option-item';
                    if (isMulti) optDiv.classList.add('multi-mode');
                    optDiv.setAttribute('data-key', key);
                    optDiv.tabIndex = 0;
                    optDiv.setAttribute('role', 'button');

                    let isSelected = false;
                    if (isMulti && Array.isArray(userAns)) isSelected = userAns.includes(key);
                    else if (!isMulti && userAns === key) isSelected = true;
                    
                    if (isSelected && !revealed) optDiv.classList.add('selected');
                    if (isMulti && isSelected && !revealed) optDiv.classList.add('checked');

                    if (revealed) {
                        const correctKeys = q.answer.split('');
                        if (isMulti) {
                            const wasSelected = Array.isArray(userAns) && userAns.includes(key);
                            const isCorrectOption = correctKeys.includes(key);
                            if (wasSelected && isCorrectOption) optDiv.classList.add('correct-reveal');
                            else if (wasSelected && !isCorrectOption) optDiv.classList.add('wrong-reveal');
                            else if (!wasSelected && isCorrectOption) optDiv.classList.add('correct-reveal');
                        } else {
                            if (key === q.answer) optDiv.classList.add('correct-reveal');
                            if (key === userAns && userAns !== q.answer) optDiv.classList.add('wrong-reveal');
                        }
                    }

                    const letterSpan = document.createElement('span');
                    letterSpan.className = 'option-letter';
                    letterSpan.textContent = key;
                    optDiv.appendChild(letterSpan);

                    if (isMulti) {
                        const checkSpan = document.createElement('span');
                        checkSpan.className = 'option-check';
                        checkSpan.textContent = '✓';
                        optDiv.appendChild(checkSpan);
                    }

                    const textSpan = document.createElement('span');
                    textSpan.className = 'option-text';
                    textSpan.textContent = q.options[key];
                    textSpan.style.fontSize = fontSizeBodyValues[fontSizeLevel];
                    optDiv.appendChild(textSpan);
                    optDiv.addEventListener('click', () => handleOptionClick(key, isMulti));
                    optDiv.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter' || ev.key === ' ' || ev.key === 'Spacebar') { ev.preventDefault(); optDiv.click(); }
                    });
                    optionsArea.appendChild(optDiv);
                });

                if (isMulti) {
                    submitMultiBtn.classList.add('visible');
                    submitMultiBtn.style.display = 'block';
                    if (revealed) {
                        submitMultiBtn.style.display = 'none';
                        submitMultiBtn.classList.remove('visible');
                    }
                } else {
                    submitMultiBtn.classList.remove('visible');
                    submitMultiBtn.style.display = 'none';
                }

                if (revealed) showResultArea(q, userAns);
                else {
                    resultArea.classList.remove('visible');
                    resultArea.style.display = 'none';
                }

                if (mistakeMode) {
                    prevBtn.disabled = mistakeList.indexOf(currentIndex) === 0;
                    nextBtn.textContent = mistakeList.indexOf(currentIndex) >= mistakeList.length - 1 ? '完成 ✓' : '下一题 ▶';
                } else {
                    prevBtn.disabled = currentIndex === 0;
                    nextBtn.textContent = currentIndex >= TOTAL - 1 ? '完成 ✓' : '下一题 ▶';
                }

                updateProgressUI();
                document.querySelector('.main-content').scrollTop = 0;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function handleOptionClick(key, isMulti) {
                if (isRevealed(currentIndex)) return;

                if (isMulti) {
                    let currentSelection = getUserAnswer(currentIndex) || [];
                    if (!Array.isArray(currentSelection)) currentSelection = [];
                    const idx = currentSelection.indexOf(key);
                    if (idx >= 0) currentSelection.splice(idx, 1);
                    else currentSelection.push(key);
                    setUserAnswer(currentIndex, currentSelection.length > 0 ? currentSelection : null);
                    refreshOptionStyles();
                } else {
                    setUserAnswer(currentIndex, key);
                    setRevealed(currentIndex);
                    renderQuestion();
                }
            }

            function refreshOptionStyles() {
                const q = allQuestions[currentIndex];
                const isMulti = q.type === 'multiple';
                const userAns = getUserAnswer(currentIndex);
                optionsArea.querySelectorAll('.option-item').forEach(item => {
                    const key = item.getAttribute('data-key');
                    item.classList.remove('selected', 'checked');
                    const isSelected = isMulti && Array.isArray(userAns) ? userAns.includes(key) : (!isMulti && userAns === key);
                    if (isSelected && isMulti) item.classList.add('selected', 'checked');
                    else if (isSelected) item.classList.add('selected');
                    item.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                });
            }

            function submitMultiAnswer() {
                const q = allQuestions[currentIndex];
                if (q.type !== 'multiple' || isRevealed(currentIndex)) return;
                const userAns = getUserAnswer(currentIndex);
                if (!userAns || userAns.length === 0) { showToast('请至少选择一个选项'); return; }
                setRevealed(currentIndex);
                renderQuestion();
            }

            function showResultArea(q, userAns) {
                resultArea.classList.add('visible');
                resultArea.style.display = 'block';
                let isCorrect = false;
                if (q.type === 'multiple') {
                    const cs = q.answer.split('').sort().join('');
                    const us = (Array.isArray(userAns) ? [...userAns] : []).sort().join('');
                    isCorrect = cs === us;
                } else {
                    isCorrect = userAns === q.answer;
                }

                if (isCorrect) {
                    resultHeader.className = 'result-header correct';
                    resultHeader.innerHTML = '<span class="result-icon">✅</span> 回答正确！';
                } else {
                    resultHeader.className = 'result-header wrong';
                    resultHeader.innerHTML = '<span class="result-icon">❌</span> 回答错误';
                }

                const answerLabels = q.answer.split('').map(k => `${k}：${q.options[k]}`).join('；');
                correctAnswerDisplay.innerHTML = '<strong>正确答案：</strong>' + answerLabels;
                analysisContent.innerHTML = q.analysis;
                analysisContent.style.fontSize = fontSmValues[fontSizeLevel];
                analysisContent.classList.remove('expanded');
                analysisContent.style.display = 'none';
                analysisToggle.classList.remove('expanded');
                analysisToggle.querySelector('.arrow-icon').textContent = '▾';
                analysisToggle.style.display = 'flex';
            }

            function toggleAnalysis() {
                const isExpanded = analysisContent.classList.contains('expanded');
                if (isExpanded) {
                    analysisContent.classList.remove('expanded');
                    analysisContent.style.display = 'none';
                    analysisToggle.classList.remove('expanded');
                    analysisToggle.querySelector('.arrow-icon').textContent = '▾';
                } else {
                    analysisContent.classList.add('expanded');
                    analysisContent.style.display = 'block';
                    analysisToggle.classList.add('expanded');
                    analysisToggle.querySelector('.arrow-icon').textContent = '▴';
                }
            }

            function updateProgressUI() {
                const answered = getAnsweredCount();
                const correct = getCorrectCount();
                progressText.textContent = `已答 ${answered}/${TOTAL}`;
                correctRate.textContent = answered > 0 ? `正确率 ${Math.round((correct / answered) * 100)}%` : '正确率 -';
                progressBar.style.width = `${Math.round((answered / TOTAL) * 100)}%`;
            }

            function goToQuestion(index) {
                if (index < 0 || index >= TOTAL) return;
                currentIndex = index;
                saveProgress();
                renderQuestion();
                closeOverlay();
            }

            function goNext() {
                if (mistakeMode) {
                    let currentPos = mistakeList.indexOf(currentIndex);
                    if (currentPos < mistakeList.length - 1) goToQuestion(mistakeList[currentPos + 1]);
                    else {
                        showToast(`已看完所有错题！`);
                        showSummaryPanel();
                    }
                    return;
                }
                if (currentIndex < TOTAL - 1) goToQuestion(currentIndex + 1);
                else showSummaryPanel();
            }

            function goPrev() {
                if (mistakeMode) {
                    let currentPos = mistakeList.indexOf(currentIndex);
                    if (currentPos > 0) goToQuestion(mistakeList[currentPos - 1]);
                    return;
                }
                if (currentIndex > 0) goToQuestion(currentIndex - 1);
            }

            // ==================== 题单面板 ====================
            function buildSheetGrid() {
                sheetGrid.innerHTML = '';
                let lastPart = 0;
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    if (q.part !== lastPart) {
                        lastPart = q.part;
                        const label = document.createElement('div');
                        label.className = 'sheet-section-label';
                        label.textContent = getPartLabel(q.part);
                        sheetGrid.appendChild(label);
                    }
                    const item = document.createElement('div');
                    item.className = 'sheet-item';
                    item.textContent = q.num;
                    const ua = userAnswers[i];
                    if (revealedAnswers[i] && ua) {
                        let isCorrect = q.type === 'multiple' 
                            ? q.answer.split('').sort().join('') === (Array.isArray(ua)?ua:[]).sort().join('')
                            : ua === q.answer;
                        item.classList.add(isCorrect ? 'correct-dot' : 'wrong-dot');
                    } else if (ua) item.classList.add('correct-dot');
                    else item.classList.add('unanswered');
                    
                    if (i === currentIndex && !mistakeMode) item.classList.add('current-dot');
                    
                    item.addEventListener('click', () => { mistakeMode = false; goToQuestion(i); });
                    sheetGrid.appendChild(item);
                }
            }

            function openOverlay() { buildSheetGrid(); overlay.classList.add('visible'); document.body.style.overflow = 'hidden'; }
            function closeOverlay() { overlay.classList.remove('visible'); document.body.style.overflow = ''; }

            let toastTimer;
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
            }

            // ==================== 结算与错题记录 ====================
            function generateMistakeList() {
                let wrongIndices = [];
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    const ua = userAnswers[i];
                    if (revealedAnswers[i] && ua) {
                        let isCorrect = q.type === 'multiple' 
                            ? q.answer.split('').sort().join('') === (Array.isArray(ua)?ua:[]).sort().join('')
                            : ua === q.answer;
                        if (!isCorrect) wrongIndices.push(i);
                    }
                }
                return wrongIndices;
            }

            function showSummaryPanel() {
                let singleAns = 0, singleCorrect = 0, multiAns = 0, multiCorrect = 0, judgeAns = 0, judgeCorrect = 0, answered = 0;
                for (let i = 0; i < TOTAL; i++) {
                    const q = allQuestions[i];
                    const ua = userAnswers[i];
                    if (ua && (typeof ua === 'string' ? ua.length > 0 : ua.length > 0)) {
                        answered++;
                        if (q.part === 1) singleAns++;
                        else if (q.part === 2) multiAns++;
                        else if (q.part === 3) judgeAns++;

                        let isCorrect = q.type === 'multiple' 
                            ? q.answer.split('').sort().join('') === (Array.isArray(ua)?ua:[]).sort().join('')
                            : ua === q.answer;
                        if (isCorrect) {
                            if (q.part === 1) singleCorrect++;
                            else if (q.part === 2) multiCorrect++;
                            else if (q.part === 3) judgeCorrect++;
                        }
                    }
                }
                
                $('#sumTotal').textContent = TOTAL;
                $('#sumAnswered').textContent = answered;
                $('#sumCorrect').textContent = singleCorrect + multiCorrect + judgeCorrect;
                $('#rateSingle').textContent = singleAns ? Math.round(singleCorrect/singleAns * 100) + '%' : '0%';
                $('#rateMulti').textContent = multiAns ? Math.round(multiCorrect/multiAns * 100) + '%' : '0%';
                $('#rateJudge').textContent = judgeAns ? Math.round(judgeCorrect/judgeAns * 100) + '%' : '0%';
                
                $('#summaryOverlay').classList.add('visible');
                document.body.style.overflow = 'hidden';
            }

            // ==================== 历史记录面板 ====================
            function openHistoryPanel() {
                const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                const listEl = $('#historyList');
                listEl.innerHTML = '';
                if (history.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center; color:#888; padding: 40px 0; font-size: 14px;">暂无历史记录<br><span style="font-size:12px; color:#aaa; margin-top:10px; display:inline-block;">（交卷并点击"重新开始"即可自动保存）</span></div>';
                } else {
                    history.forEach((rec, index) => {
                        const rate = rec.answered > 0 ? Math.round((rec.correct / rec.answered) * 100) : 0;
                        const item = document.createElement('div');
                        item.style.cssText = 'background: #f9f9fb; padding: 14px; border-radius: 12px; margin-bottom: 12px; font-size: 14px; border: 1px solid #eee;';
                        item.innerHTML = `
                            <div style="display:flex; justify-content:space-between; margin-bottom: 8px; color: #333; font-weight: 700;">
                                <span>${rec.date}</span>
                                <span style="color: var(--primary);">正确率 ${rate}%</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; color: #666; font-size: 13px; margin-bottom: 12px; background: #fff; padding: 6px 10px; border-radius: 6px;">
                                <span>已答: ${rec.answered}</span>
                                <span>答对: <span style="color: var(--correct); font-weight: bold;">${rec.correct}</span></span>
                                <span>错题: <span style="color: var(--wrong); font-weight: bold;">${rec.mistakes.length}</span></span>
                            </div>
                            <div style="display:flex; gap: 8px;">
                                <button class="nav-btn load-btn" style="flex:1; min-height:36px; padding: 0;">加载记录</button>
                                <button class="nav-btn primary-nav view-err-btn" style="flex:1; min-height:36px; padding: 0;" ${rec.mistakes.length === 0 ? 'disabled' : ''}>看错题</button>
                                <button class="nav-btn del-btn" style="flex:0.5; min-height:36px; padding: 0; color: #FF3B30; border-color: #FFECEB; background: #FFECEB;">删除</button>
                            </div>
                        `;

                        item.querySelector('.load-btn').addEventListener('click', () => {
                            if (getAnsweredCount() > 0 && !confirm('加载历史记录将覆盖您当前的答题进度。\n建议您先在"答题报告"点击"重新开始"保存当前进度。\n\n确认覆盖并加载吗？')) return;
                            userAnswers = rec.userAnswers || {};
                            revealedAnswers = rec.revealedAnswers || {};
                            mistakeMode = false;
                            currentIndex = 0;
                            saveProgress();
                            $('#historyOverlay').classList.remove('visible');
                            document.body.style.overflow = '';
                            renderQuestion();
                            showToast('✅ 历史记录加载成功');
                        });

                        item.querySelector('.view-err-btn').addEventListener('click', () => {
                            if (getAnsweredCount() > 0 && !confirm('查看历史错题将暂时覆盖您当前的答题现场。\n确认查看吗？')) return;
                            userAnswers = rec.userAnswers || {};
                            revealedAnswers = rec.revealedAnswers || {};
                            mistakeList = rec.mistakes;
                            mistakeMode = true;
                            currentIndex = mistakeList[0] !== undefined ? mistakeList[0] : 0;
                            saveProgress();
                            $('#historyOverlay').classList.remove('visible');
                            document.body.style.overflow = '';
                            renderQuestion();
                            showToast(`进入历史错题模式，共 ${mistakeList.length} 题`);
                        });

                        item.querySelector('.del-btn').addEventListener('click', () => {
                            if (confirm('确定要删除这条历史记录吗？')) {
                                history.splice(index, 1);
                                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                                openHistoryPanel(); // 刷新列表
                            }
                        });

                        listEl.appendChild(item);
                    });
                }
                $('#historyOverlay').classList.add('visible');
                document.body.style.overflow = 'hidden';
            }

            // ==================== 事件绑定 ====================
            $('#homeBtn').addEventListener('click', () => window.location.href = 'index.html');
            $('#backBtn').addEventListener('click', openOverlay);
            $('#historyBtn').addEventListener('click', openHistoryPanel);
            
            $('#sheetClose').addEventListener('click', closeOverlay);
            $('#viewSummaryBtn').addEventListener('click', () => { closeOverlay(); showSummaryPanel(); });
            $('#summaryClose').addEventListener('click', () => { $('#summaryOverlay').classList.remove('visible'); document.body.style.overflow = ''; });
            $('#historyClose').addEventListener('click', () => { $('#historyOverlay').classList.remove('visible'); document.body.style.overflow = ''; });
            
            $('.overlay').addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('visible'); document.body.style.overflow = ''; } });
            $('#historyOverlay').addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('visible'); document.body.style.overflow = ''; } });
            
            $('#prevBtn').addEventListener('click', goPrev);
            $('#nextBtn').addEventListener('click', goNext);
            $('#submitMultiBtn').addEventListener('click', submitMultiAnswer);
            $('#analysisToggle').addEventListener('click', toggleAnalysis);

            $('#restartBtn').addEventListener('click', () => {
                const ansCount = getAnsweredCount();
                const msg = ansCount > 0 ? '确定要交卷并重新开始吗？\n\n您当前的进度将会被自动保存到历史记录中。' : '确定要清空答题记录，重新开始吗？';
                if(confirm(msg)) {
                    archiveCurrentToHistory(); // 归档
                    userAnswers = {};
                    revealedAnswers = {};
                    mistakeMode = false;
                    currentIndex = 0;
                    saveProgress();
                    $('#summaryOverlay').classList.remove('visible');
                    document.body.style.overflow = '';
                    renderQuestion();
                    showToast(ansCount > 0 ? '✅ 已重新开始，进度已归档至历史记录' : '已重新开始');
                }
            });

            $('#viewMistakesBtn').addEventListener('click', () => {
                mistakeList = generateMistakeList();
                if (mistakeList.length === 0) { showToast('太棒了，没有错题！'); return; }
                mistakeMode = true;
                currentIndex = mistakeList[0];
                saveProgress();
                $('#summaryOverlay').classList.remove('visible');
                document.body.style.overflow = '';
                renderQuestion();
                showToast(`进入错题模式，共 ${mistakeList.length} 题`);
            });

            $('#fontSizeBtn').addEventListener('click', () => {
                fontSizeLevel = (fontSizeLevel + 1) % 6;
                applyFontSize();
                saveProgress();
                showToast(`字体大小：${fontSizeLabels[fontSizeLevel]}`);
            });

            // 字体选择器逻辑
            const fontMenu = document.getElementById('fontMenu');
            const fontSelectBtn = document.getElementById('fontSelectBtn');
            function applyPreferredFont(pref) {
                let fam = '';
                if (pref === 'system') fam = "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif";
                else if (pref === 'Noto Sans SC') fam = "'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif";
                else if (pref === 'Noto Serif SC') fam = "'Noto Serif SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif";
                else fam = pref;
                document.documentElement.style.setProperty('--font-family', fam);
                localStorage.setItem('preferred_font', pref);
            }

            fontSelectBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fontMenu.classList.toggle('visible');
                fontMenu.setAttribute('aria-hidden', fontMenu.classList.contains('visible') ? 'false' : 'true');
            });

            fontMenu.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const pref = btn.getAttribute('data-font');
                applyPreferredFont(pref === 'system' ? 'system' : pref);
                fontMenu.classList.remove('visible');
                showToast('已切换字体：' + (pref === 'system' ? '系统默认' : pref));
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.font-menu') && !e.target.closest('#fontSelectBtn')) {
                    fontMenu.classList.remove('visible');
                }
            });

            // 初始化首选字体
            const prefFont = localStorage.getItem('preferred_font');
            if (prefFont) applyPreferredFont(prefFont);

            // 键盘与滑动辅助
            document.addEventListener('keydown', e => {
                if ($('#overlay').classList.contains('visible') || $('#summaryOverlay').classList.contains('visible') || $('#historyOverlay').classList.contains('visible')) return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
                else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goPrev(); }
            });

            let touchStartX = 0, touchStartY = 0;
            document.addEventListener('touchstart', e => {
                if (e.target.closest('.overlay') || e.target.closest('.sheet-panel') || e.target.closest('.summary-panel')) return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            document.addEventListener('touchend', e => {
                if (e.target.closest('.overlay') || e.target.closest('.sheet-panel') || e.target.closest('.summary-panel')) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                    if (dx < -30) goNext();
                    else if (dx > 30) goPrev();
                }
            });

            // ==================== 初始化 ====================
            function init() {
                loadProgress();
                applyFontSize();
                renderQuestion();
                updateProgressUI();
                initTheme();
            }

            // ==================== 主题逻辑 ====================
            const THEME_KEY = 'exam_theme_pref_v1';
            const themeToggleBtn = document.getElementById('themeToggleBtn');

            function applyThemeClass(theme) {
                document.documentElement.classList.remove('dark', 'light');
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else if (theme === 'light') document.documentElement.classList.add('light');
                // update icon
                if (theme === 'dark') themeToggleBtn.textContent = '☀️';
                else themeToggleBtn.textContent = '🌙';
            }

            function initTheme() {
                try {
                    let theme = localStorage.getItem(THEME_KEY);
                    if (!theme) {
                        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    }
                    applyThemeClass(theme);
                } catch (e) {}
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const isDark = document.documentElement.classList.contains('dark');
                    const next = isDark ? 'light' : 'dark';
                    applyThemeClass(next);
                    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
                });
            }

            init();
        })();
    </script>
</body>
</html>
