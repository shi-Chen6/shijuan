<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>汕头市潮南教师招聘 - 刷题练习</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #555;
            --text-light: #777;
            --primary: #4a6cf7;
            --primary-light: #eef1ff;
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --border: #e8ecf1;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --font-base: 16px;
            --font-option: 16px;
            --font-parse: 14px;
            --transition-fast: 0.18s ease;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--font-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
        }

        /* ========== 顶部导航栏 ========== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            min-height: 50px;
        }
        .btn-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back:active {
            background: #e2e5ea;
            transform: scale(0.94);
        }
        .progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .progress-bar-outer {
            flex: 1;
            height: 8px;
            background: #e8ecf1;
            border-radius: 10px;
            overflow: hidden;
            min-width: 40px;
        }
        .progress-bar-inner {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-font {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .btn-font:active {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: calc(20px + var(--safe-bottom));
        }

        /* 题目卡片 */
        .question-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
            border: 1.5px solid transparent;
        }
        .question-card.correct-flash {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08);
        }
        .question-card.wrong-flash {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
        }
        .question-type-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }
        .badge-single {
            background: #eef1ff;
            color: #4a6cf7;
        }
        .badge-multi {
            background: #fef3c7;
            color: #b45309;
        }
        .badge-judge {
            background: #ecfdf5;
            color: #059669;
        }
        .question-number {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 6px;
        }
        .question-stem {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.7;
            margin-bottom: 4px;
            letter-spacing: 0.01em;
        }
        .question-note {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
            font-style: italic;
        }

        /* 选项列表 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 14px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 15px;
            border: 1.8px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: #fafbfc;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            font-size: var(--font-option);
            line-height: 1.5;
            word-break: break-word;
        }
        .option-item:active {
            transform: scale(0.985);
            background: #f0f2f5;
        }
        .option-item.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.06);
        }
        .option-item.correct-reveal {
            border-color: var(--success) !important;
            background: var(--success-light) !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.07) !important;
        }
        .option-item.wrong-reveal {
            border-color: var(--danger) !important;
            background: var(--danger-light) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.07) !important;
        }
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            color: #555;
        }
        .option-item.selected .option-letter {
            background: var(--primary);
            color: #fff;
        }
        .option-item.correct-reveal .option-letter {
            background: var(--success);
            color: #fff;
        }
        .option-item.wrong-reveal .option-letter {
            background: var(--danger);
            color: #fff;
        }
        .option-text {
            flex: 1;
            padding-top: 4px;
            color: var(--text);
            font-weight: 500;
        }
        .option-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity var(--transition-fast);
            pointer-events: none;
        }
        .option-item.correct-reveal .option-icon {
            opacity: 1;
        }
        .option-item.wrong-reveal .option-icon {
            opacity: 1;
        }

        /* 答案与解析区域 */
        .answer-parse-area {
            margin-top: 14px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            animation: fadeSlideIn 0.35s ease;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .answer-status {
            padding: 12px 15px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }
        .answer-status.correct {
            background: var(--success-light);
            color: #065f46;
        }
        .answer-status.wrong {
            background: var(--danger-light);
            color: #991b1b;
        }
        .parse-content-wrap {
            background: #fafbfc;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            padding: 0;
        }
        .parse-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            border-bottom: 1px solid transparent;
            transition: all var(--transition-fast);
        }
        .parse-header.collapsed {
            border-bottom: none;
        }
        .parse-header .arrow-icon {
            transition: transform 0.3s ease;
            font-size: 0.7rem;
            color: #999;
        }
        .parse-header.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }
        .parse-body {
            padding: 8px 15px 14px;
            font-size: var(--font-parse);
            color: #444;
            line-height: 1.7;
            border-top: 1px solid var(--border);
            transition: all 0.3s ease;
            overflow: hidden;
            max-height: 600px;
            opacity: 1;
        }
        .parse-body.hidden {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            border-top: none;
            margin: 0;
        }
        .parse-body strong {
            color: var(--text);
        }

        /* 底部导航按钮 */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .btn-nav {
            flex: 1;
            min-width: 80px;
            padding: 13px 16px;
            border-radius: 25px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.02em;
            text-align: center;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-prev {
            background: #fff;
            color: var(--text);
            border: 1.8px solid var(--border);
        }
        .btn-prev:active {
            background: #f0f2f5;
            transform: scale(0.96);
        }
        .btn-next {
            background: var(--primary);
            color: #fff;
            border: 1.8px solid var(--primary);
        }
        .btn-next:active {
            background: #3b5de7;
            transform: scale(0.96);
        }
        .btn-nav:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(20%);
        }

        /* 底部信息栏 */
        .bottom-info {
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
            padding: 8px 0;
            letter-spacing: 0.03em;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            box-shadow: var(--shadow-lg);
        }
        .toast.show {
            opacity: 1;
        }

        /* 响应式微调 */
        @media (max-width: 380px) {
            .question-stem {
                font-size: 0.95rem;
            }
            .option-item {
                padding: 12px 12px;
                gap: 8px;
                font-size: 0.9rem;
            }
            .option-letter {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }
            .btn-nav {
                padding: 11px 12px;
                font-size: 0.82rem;
                min-height: 42px;
            }
        }
        @media (min-width: 501px) {
            .app-container {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.06);
            }
            body {
                padding: 10px 0;
            }
        }
        /* 题目列表面板 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        .overlay.visible {
            display: flex;
        }
        .sheet-panel {
            background: #fff;
            width: 100%;
            max-width: 500px;
            max-height: 75vh;
            border-radius: 20px 20px 0 0;
            padding: 16px 14px 20px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #d1d1d6;
            border-radius: 10px;
            margin: 0 auto 14px;
        }
        .sheet-title {
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text);
        }
        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }
        .sheet-item {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
            min-width: 36px;
            min-height: 36px;
        }
        .sheet-item.unanswered {
            background: #f0f0f5;
            color: #888;
        }
        .sheet-item.correct-dot {
            background: #E8F8ED;
            color: var(--success);
            border-color: var(--success);
        }
        .sheet-item.wrong-dot {
            background: #FFECEB;
            color: var(--danger);
            border-color: var(--danger);
        }
        .sheet-item.current-dot {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.2);
            font-weight: 700;
        }
        .sheet-section-label {
            grid-column: 1 / -1;
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-align: left;
            padding: 6px 0 2px;
            letter-spacing: 0.3px;
        }
        .sheet-close {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 14px;
            background: #f5f5f7;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <!-- 顶部导航 -->
        <div class="top-bar">
            <button class="btn-back" id="btnBack" title="返回列表">←</button>
            <div class="progress-wrap">
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progressBar"></div>
                </div>
                <span class="progress-text" id="progressText">1/100</span>
            </div>
            <button class="btn-font" id="btnFontSize" title="调整字体大小">A</button>
        </div>

        <!-- 主内容 -->
        <div class="main-content" id="mainContent">
            <!-- 动态渲染题目 -->
        </div>

        <!-- 题单覆盖层 -->
        <div class="overlay" id="overlay">
            <div class="sheet-panel" id="sheetPanel">
                <div class="sheet-handle"></div>
                <div class="sheet-title">📋 题目列表（点击跳转）</div>
                <div class="sheet-grid" id="sheetGrid"></div>
                <button class="sheet-close" id="sheetClose">关闭</button>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        (function() {
            // ==================== 题目数据 ====================
            // 格式：{ id, type:'single'|'multi'|'judge', stem, options:[{letter,text}], answer:[], parse }
            const allQuestions = [
                // ===== 单选题 1-60 =====
                {
                    id: 1,
                    type: 'single',
                    stem: '教育的心理起源说认为（ ）。',
                    options: [
                        { letter: 'A', text: '教育起源于民族文化的传承与发展' },
                        { letter: 'B', text: '教育起源于人际交往活动' },
                        { letter: 'C', text: '教育起源于生物本能与生存需要' },
                        { letter: 'D', text: '教育起源于儿童对成人无意识的模仿' },
                    ],
                    answer: ['D'],
                    parse: '心理起源论者认为教育起源于儿童对成人无意识的模仿，把全部教育都归结于无意识状态下产生的模仿行为。A选项是民族文化起源说观点，B选项是交往起源说观点，C选项是生物起源说观点。'
                }, {
                    id: 2,
                    type: 'single',
                    stem: '下列不属于陶行知的教育思想的是（ ）。',
                    options: [
                        { letter: 'A', text: '生活即教育' },
                        { letter: 'B', text: '社会即学校' },
                        { letter: 'C', text: '以美育代宗教' },
                        { letter: 'D', text: '教学做合一' },
                    ],
                    answer: ['C'],
                    parse: '"生活教育"理论是陶行知教育思想的核心，包括三个基本命题：(1)生活即教育；(2)社会即学校；(3)教学做合一。C选项"以美育代宗教"属于蔡元培的教育思想。'
                }, {
                    id: 3,
                    type: 'single',
                    stem: '个体身心发展的（ ）启示教师要适时而教，即要在儿童发展的关键期或最佳期及时地进行教育。',
                    options: [
                        { letter: 'A', text: '顺序性' },
                        { letter: 'B', text: '阶段性' },
                        { letter: 'C', text: '不平衡性' },
                        { letter: 'D', text: '互补性' },
                    ],
                    answer: ['C'],
                    parse: '个体发展的不平衡性是指在连续不断的发展过程中，个体身心发展的速度并不是均匀的，在不同年龄段发展速度和水平有明显差异。这一规律告诉我们，人的不同素质都有其发展的关键期和最佳期，在关键期内施加教育影响可事半功倍。'
                }, {
                    id: 4,
                    type: 'single',
                    stem: '下列不属于《论语》中的教育思想的是（ ）。',
                    options: [
                        { letter: 'A', text: '不愤不启，不悱不发' },
                        { letter: 'B', text: '时教必有正业，退息必有居学' },
                        { letter: 'C', text: '学而时习之' },
                        { letter: 'D', text: '学而不思则罔，思而不学则殆' },
                    ],
                    answer: ['B'],
                    parse: '"不愤不启，不悱不发""学而时习之""学而不思则罔，思而不学则殆"均出自《论语》。"时教必有正业，退息必有居学"出自《学记》。'
                }, {
                    id: 5,
                    type: 'single',
                    stem: '（ ）的指导思想是"中学为体，西学为用"，其首次以法令形式确立班级授课制并在全国推广。',
                    options: [
                        { letter: 'A', text: '壬寅学制' },
                        { letter: 'B', text: '癸卯学制' },
                        { letter: 'C', text: '壬子癸丑学制' },
                        { letter: 'D', text: '壬戌学制' },
                    ],
                    answer: ['B'],
                    parse: '癸卯学制主要承袭日本学制，明文规定教育目的是"忠君、尊孔、尚公、尚武、尚实"，明显反映"中学为体，西学为用"思想，也是我国首次以法令形式确立班级授课制并在全国推广的学制。'
                }, {
                    id: 6,
                    type: 'single',
                    stem: '"出自造物主之手的东西都是好的，而一旦到了人的手里，就全变坏了"属于（ ）。',
                    options: [
                        { letter: 'A', text: '社会本位论' },
                        { letter: 'B', text: '教育无目的论' },
                        { letter: 'C', text: '个人本位论' },
                        { letter: 'D', text: '文化本位论' },

                        }
                        if (typeof state.fontLevel === 'number') {
                            fontLevel = Math.max(-1, Math.min(2, state.fontLevel));
                        }
                    }
                } catch (e) {
                    // 忽略
                }
            }

            function applyFontLevel() {
                const root = document.documentElement;
                root.style.setProperty('--font-base', fontSizes.base[fontLevel + 1] + 'px');
                root.style.setProperty('--font-option', fontSizes.option[fontLevel + 1] + 'px');
                root.style.setProperty('--font-parse', fontSizes.parse[fontLevel + 1] + 'px');
                btnFontSize.textContent = fontLevel === -1 ? 'A⁻' : fontLevel === 2 ? 'A⁺' : 'A';
            }

            function getTypeBadge(type) {
                if (type === 'single') return '<span class="question-type-badge badge-single">单选题</span>';
                if (type === 'multi') return '<span class="question-type-badge badge-multi">多选题</span>';
                return '<span class="question-type-badge badge-judge">判断题</span>';
            }

            function getTypeLabel(type) {
                if (type === 'single') return '单选';
                if (type === 'multi') return '多选';
                return '判断';
            }

            // ==================== 渲染题目 ====================
            function renderQuestion(index) {
                if (index < 0 || index >= allQuestions.length) return;
                currentIndex = index;
                const q = allQuestions[index];
                const answered = answeredMap[q.id];
                const isAnswered = !!answered;
                const selectedLetters = answered ? answered.selected : [];
                const isCorrect = answered ? answered.isCorrect : null;
                const typeLabel = getTypeLabel(q.type);

                // 进度
                const progressPercent = ((index + 1) / allQuestions.length) * 100;
                progressBar.style.width = progressPercent + '%';
                progressText.textContent = `${index + 1}/${allQuestions.length}`;

                // 构建HTML
                let html = '';
                html += '<div class="question-card" id="questionCard">';
                html += getTypeBadge(q.type);
                html +=
                    `<div class="question-number">第 ${q.id} 题 · ${typeLabel}题 ${q.type==='multi'?'（多选）':''}</div>`;
                html += `<div class="question-stem">${q.stem}</div>`;
                if (q.type === 'multi') {
                    html += '<div class="question-note">🔔 本题为多选题，请选择所有正确答案</div>';
                }
                html += '<div class="options-list" id="optionsList">';
                q.options.forEach((opt, optIdx) => {
                    const isSel = selectedLetters.includes(opt.letter);
                    let optClass = 'option-item';
                    if (isAnswered) {
                        if (q.answer.includes(opt.letter)) {
                            optClass += ' correct-reveal';
                        } else if (isSel && !q.answer.includes(opt.letter)) {
                            optClass += ' wrong-reveal';
                        }
                    } else if (isSel) {
                        optClass += ' selected';
                    }
                    const iconHtml = (isAnswered && q.answer.includes(opt.letter)) ?
                        '<span class="option-icon">✓</span>' :
                        (isAnswered && isSel && !q.answer.includes(opt.letter)) ?
                        '<span class="option-icon">✗</span>' : '';
                    html += `
                        <div class="${optClass}" data-letter="${opt.letter}" data-index="${optIdx}">
                            <div class="option-letter">${opt.letter}</div>
                            <div class="option-text">${opt.text}</div>
                            ${iconHtml}
                        </div>`;
                });
                html += '</div>';

                // 答案与解析区域
                if (isAnswered) {
                    const statusClass = isCorrect ? 'correct' : 'wrong';
                    const statusText = isCorrect ? '✅ 回答正确' : '❌ 回答错误';
                    const correctAnswerStr = q.answer.join(', ');
                    html += '<div class="answer-parse-area">';
                    html += `<div class="answer-status ${statusClass}">${statusText}　正确答案：${correctAnswerStr}</div>`;
                    html += '<div class="parse-content-wrap">';
                    html += '<div class="parse-header" id="parseHeader">📖 详细解析 <span class="arrow-icon">▼</span></div>';
                    html += `<div class="parse-body" id="parseBody">${q.parse}</div>`;
                    html += '</div>';
                    html += '</div>';
                }

                html += '</div>'; // question-card

                // 导航按钮
                html += '<div class="nav-buttons">';
                html +=
                    `<button class="btn-nav btn-prev" id="btnPrev" ${index===0?'disabled':''}>◀ 上一题</button>`;
                html +=
                    `<button class="btn-nav btn-next" id="btnNext" ${index>=allQuestions.length-1?'disabled':''}>下一题 ▶</button>`;
                html += '</div>';
                html += '<div class="bottom-info">题库共 ' + allQuestions.length + ' 题 · 已答 ' + Object.keys(
                    answeredMap).length + ' 题</div>';

                mainContent.innerHTML = html;

                // 绑定事件
                bindEvents(q, isAnswered);
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
                saveState();
            }

            function bindEvents(q, isAnswered) {
                const card = document.getElementById('questionCard');
                const optionsList = document.getElementById('optionsList');
                const btnPrev = document.getElementById('btnPrev');
                const btnNext = document.getElementById('btnNext');
                const parseHeader = document.getElementById('parseHeader');
                const parseBody = document.getElementById('parseBody');

                // 选项点击
                if (optionsList && !isAnswered) {
                    optionsList.addEventListener('click', function(e) {
                        const optionItem = e.target.closest('.option-item');
                        if (!optionItem) return;
                        const letter = optionItem.getAttribute('data-letter');
                        if (!letter) return;
                        handleOptionSelect(q, letter);
                    });
                }

                // 解析折叠
                if (parseHeader && parseBody) {
                    // 默认展开
                    parseHeader.classList.remove('collapsed');
                    parseBody.classList.remove('hidden');
                    parseHeader.addEventListener('click', function() {
                        const isHidden = parseBody.classList.contains('hidden');
                        if (isHidden) {
                            parseBody.classList.remove('hidden');
                            parseHeader.classList.remove('collapsed');
                            parseHeader.querySelector('.arrow-icon').textContent = '▼';
                        } else {
                            parseBody.classList.add('hidden');
                            parseHeader.classList.add('collapsed');
                            parseHeader.querySelector('.arrow-icon').textContent = '▶';
                        }
                    });
                }

                // 导航按钮
                if (btnPrev) {
                    btnPrev.addEventListener('click', () => {
                        if (currentIndex > 0) renderQuestion(currentIndex - 1);
                    });
                }
                if (btnNext) {
                    btnNext.addEventListener('click', () => {
                        if (currentIndex < allQuestions.length - 1) renderQuestion(currentIndex + 1);
                    });
                }

                // 卡片闪烁效果
                if (isAnswered && card) {
                    const answeredData = answeredMap[q.id];
                    if (answeredData && answeredData.isCorrect) {
                        card.classList.add('correct-flash');
                    } else if (answeredData && !answeredData.isCorrect) {
                        card.classList.add('wrong-flash');
                    }
                }
            }

            function handleOptionSelect(q, letter) {
                if (answeredMap[q.id]) return; // 已答过

                let selected;
                if (q.type === 'multi') {
                    // 多选：切换选中状态
                    const currentSel = answeredMap[q.id]?.selected || [];
                    if (currentSel.includes(letter)) {
                        selected = currentSel.filter(l => l !== letter);
                    } else {
                        selected = [...currentSel, letter];
                    }
                    if (selected.length === 0) {
                        // 至少选一个，暂不提交
                        updateMultiSelectUI(q, selected);
                        return;
                    }
                    // 多选需要确认提交：点击已选中的最后一个选项或通过其他方式
                    // 这里简化：当用户点击选项时，如果该选项已在选中列表中且选中数>=1，则提交
                    if (currentSel.includes(letter) && currentSel.length >= 1) {
                        // 用户再次点击已选项，视为取消后重新选择，不自动提交
                        updateMultiSelectUI(q, selected);
                        return;
                    }
                    // 如果选中数达到答案数量或用户点击"提交"按钮，这里简化处理
                    updateMultiSelectUI(q, selected);
                    // 多选：自动在选中2个以上时延迟提交，或用户可手动提交
                    // 这里采用简单方案：多选也即时判断（选中即提交判断）
                    submitMultiAnswer(q, selected);
                    return;
                } else {
                    // 单选/判断：直接提交
                    selected = [letter];
                    submitAnswer(q, selected);
                }
            }

            function updateMultiSelectUI(q, selected) {
                const optionItems = document.querySelectorAll('.option-item');
                optionItems.forEach(item => {
                    const l = item.getAttribute('data-letter');
                    if (selected.includes(l)) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
                // 暂存选中状态
                answeredMap[q.id] = { selected, isCorrect: null, pending: true };
                saveState();
            }

            function submitMultiAnswer(q, selected) {
                const correctAnswers = q.answer;
                const selSet = new Set(selected);
                const corSet = new Set(correctAnswers);
                const isCorrect = selSet.size === corSet.size && [...selSet].every(s => corSet.has(s));
                answeredMap[q.id] = { selected, isCorrect };
                saveState();
                renderQuestion(currentIndex);
                if (isCorrect) {
                    showToast('✅ 回答正确！');
                } else {
                    showToast('❌ 回答错误，请查看解析');
                }
            }

            function submitAnswer(q, selected) {
                const correctAnswers = q.answer;
                const isCorrect = selected.length === correctAnswers.length && selected.every(s => correctAnswers
                    .includes(s));
                answeredMap[q.id] = { selected, isCorrect };
                saveState();
                renderQuestion(currentIndex);
                if (isCorrect) {
                    showToast('✅ 回答正确！');
                } else {
                    showToast('❌ 回答错误，请查看解析');
                }
            }

            // ==================== 题单面板 ====================
            function buildSheetGrid() {
                const sheetGrid = document.getElementById('sheetGrid');
                if (!sheetGrid) return;
                sheetGrid.innerHTML = '';
                allQuestions.forEach((q, idx) => {
                    const item = document.createElement('div');
                    item.className = 'sheet-item';
                    item.textContent = q.id;
                    const aData = answeredMap[q.id];
                    if (aData && aData.isCorrect === true) {
                        item.classList.add('correct-dot');
                    } else if (aData && aData.isCorrect === false) {
                        item.classList.add('wrong-dot');
                    } else if (aData && aData.pending) {
                        item.classList.add('correct-dot'); 
                    } else {
                        item.classList.add('unanswered');
                    }
                    if (idx === currentIndex) {
                        item.classList.add('current-dot');
                    }
                    item.addEventListener('click', () => {
                        if (!isNaN(idx) && idx >= 0 && idx < allQuestions.length) {
                            closeOverlay();
                            renderQuestion(idx);
                        }
                    });
                    sheetGrid.appendChild(item);
                });
            }

            function openOverlay() {
                buildSheetGrid();
                const overlay = document.getElementById('overlay');
                if(overlay) overlay.classList.add('visible');
                document.body.style.overflow = 'hidden';
            }

            function closeOverlay() {
                const overlay = document.getElementById('overlay');
                if(overlay) overlay.classList.remove('visible');
                document.body.style.overflow = '';
            }

            // ==================== 返回按钮：跳转到题目列表 ====================
            btnBack.addEventListener('click', (e) => {
                e.preventDefault();
                openOverlay();
            });

            // 监听关闭和背景点击
            const sheetClose = document.getElementById('sheetClose');
            if (sheetClose) sheetClose.addEventListener('click', closeOverlay);
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closeOverlay();
                });
            }

            // ==================== 字体调整 ====================
            btnFontSize.addEventListener('click', () => {
                fontLevel = (fontLevel + 1) % 4;
                if (fontLevel === 3) fontLevel = -1; // 循环：-1,0,1,2
                if (fontLevel < -1) fontLevel = 2;
                // 简化循环
                if (fontLevel > 2) fontLevel = -1;
                applyFontLevel();
                saveState();
                showToast(
                    `字体大小：${fontLevel===-1?'小':fontLevel===0?'标准':fontLevel===1?'大':'特大'}`);
                // 重新渲染以应用字体
                if (document.getElementById('questionCard')) {
                    renderQuestion(currentIndex);
                }
            });

            // ==================== 键盘导航（PC端辅助） ====================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft' && currentIndex > 0 && document.getElementById('questionCard')) {
                    renderQuestion(currentIndex - 1);
                } else if (e.key === 'ArrowRight' && currentIndex < allQuestions.length - 1 && document
                    .getElementById('questionCard')) {
                    renderQuestion(currentIndex + 1);
                } else if (e.key === 'Escape' && document.getElementById('questionCard')) {
                    openOverlay();
                }
            });

            // ==================== 触摸滑动导航（移动端） ====================
            let touchStartX = 0;
            let touchStartY = 0;
            document.addEventListener('touchstart', function(e) {
                if (e.target.closest('.option-item') || e.target.closest('.parse-header') || e.target.closest(
                        '.btn-nav') || e.target.closest('.list-item-btn') || e.target.closest('.btn-back') || e
                    .target.closest('.btn-font')) {
                    return;
                }
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', function(e) {
                if (!touchStartX || !document.getElementById('questionCard')) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                    if (dx < -40 && currentIndex < allQuestions.length - 1) {
                        renderQuestion(currentIndex + 1);
                    } else if (dx > 40 && currentIndex > 0) {
                        renderQuestion(currentIndex - 1);
                    }
                }
                touchStartX = 0;
                touchStartY = 0;
            });

            // ==================== 初始化 ====================
            function init() {
                loadState();
                applyFontLevel();
                renderQuestion(currentIndex);
            }

            init();

            console.log('📚 汕头市潮南教师招聘刷题应用已就绪');
            console.log('  总题数：' + allQuestions.length + ' 题（单选60+多选10+判断30）');
            console.log('  支持：本地存储进度、字体调整、解析折叠、滑动导航');
            console.log('  点击左上角←按钮查看题目列表');
        })();
    </script>
</body>
</html>
